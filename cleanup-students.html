<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پاکسازی دانشجویان اضافی</title>
    <script src="assets/libs/tailwindcss.js"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-lg max-w-2xl w-full">
        <h1 class="text-2xl font-bold text-gray-800 mb-4 text-center">پاکسازی دانشجویان اضافی</h1>
        
        <div class="mb-6">
            <h2 class="text-lg font-semibold mb-2">وضعیت فعلی:</h2>
            <div id="current-status" class="bg-gray-50 p-4 rounded"></div>
        </div>
        
        <button onclick="cleanupStudents()" class="bg-red-600 hover:bg-red-700 text-white px-6 py-3 rounded-lg font-medium mb-4 w-full">
            حذف دانشجویان اضافی (نگه‌داری فقط 2 دانشجو)
        </button>
        
        <a href="index.html" class="block bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-medium text-center">
            بازگشت به صفحه اصلی
        </a>
        
        <div id="message" class="mt-4 p-3 rounded hidden"></div>
    </div>
    
    <script>
        // Show current status
        function showStatus() {
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const students = users.filter(u => u.role === 'student');
            
            const statusDiv = document.getElementById('current-status');
            statusDiv.innerHTML = `
                <p class="mb-2"><strong>تعداد کل کاربران:</strong> ${users.length}</p>
                <p class="mb-2"><strong>تعداد دانشجویان:</strong> ${students.length}</p>
                <div class="mt-3">
                    <strong>لیست دانشجویان:</strong>
                    <ul class="list-disc list-inside mt-2">
                        ${students.map(s => `<li>${s.name} (${s.username}) - ID: ${s.id}</li>`).join('')}
                    </ul>
                </div>
            `;
        }
        
        function cleanupStudents() {
            try {
                const users = JSON.parse(localStorage.getItem('users') || '[]');
                
                // Keep only std001 and std002
                const allowedStudentIds = ['std001', 'std002'];
                const cleanedUsers = users.filter(u => {
                    if (u.role === 'student') {
                        return allowedStudentIds.includes(u.id);
                    }
                    return true; // Keep all non-student users
                });
                
                const removedCount = users.length - cleanedUsers.length;
                
                // Save cleaned users
                localStorage.setItem('users', JSON.stringify(cleanedUsers));
                
                const messageDiv = document.getElementById('message');
                messageDiv.className = 'mt-4 p-3 rounded bg-green-100 text-green-800';
                messageDiv.textContent = `${removedCount} دانشجو حذف شد! فقط 2 دانشجو باقی ماند.`;
                messageDiv.classList.remove('hidden');
                
                // Refresh status
                setTimeout(() => {
                    showStatus();
                }, 500);
                
            } catch (error) {
                const messageDiv = document.getElementById('message');
                messageDiv.className = 'mt-4 p-3 rounded bg-red-100 text-red-800';
                messageDiv.textContent = 'خطا: ' + error.message;
                messageDiv.classList.remove('hidden');
            }
        }
        
        // Show status on load
        showStatus();
    </script>
</body>
</html>
