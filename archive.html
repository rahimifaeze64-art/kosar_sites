<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بایگانی فایل‌ها - سیستم مدیریت تحصیلی</title>
    
    <!-- Styles -->
    <script src="assets/libs/tailwindcss.js"></script>
    <script src="assets/libs/alpine.min.js" defer></script>
    <link href="assets/libs/fontawesome/css/all.min.css" rel="stylesheet">
    <link href="assets/fonts/vazirmatn/vazirmatn.css" rel="stylesheet">
    <link href="assets/css/styles.css" rel="stylesheet">
    <link href="css/archive.css" rel="stylesheet">
    <link href="css/theme-olive.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-blue-900 via-yellow-900 to-blue-800 min-h-screen" x-data="archiveController()">
    <!-- Auto-apply theme script -->
    <script src="js/theme-auto-apply.js"></script>
    
    <!-- Sidebar Toggle Button (Mobile) -->
    <button @click="sidebarOpen = !sidebarOpen" 
            class="fixed top-4 right-4 z-50 bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-lg shadow-lg lg:hidden">
        <i class="fas fa-bars text-xl"></i>
    </button>

    <!-- Sidebar Overlay -->
    <div x-show="sidebarOpen" 
         @click="sidebarOpen = false"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         class="fixed inset-0 bg-black bg-opacity-50 z-40 lg:hidden"></div>

    <!-- Sidebar -->
    <aside :class="sidebarOpen ? 'translate-x-0' : 'translate-x-full'"
           class="fixed top-0 right-0 h-full w-80 bg-gradient-to-b from-blue-600 via-blue-700 to-blue-800 shadow-2xl z-50 transition-all duration-300 ease-in-out flex flex-col">
        
        <!-- Sidebar Header -->
        <div class="p-4 border-b border-blue-500 border-opacity-30">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center space-x-3 space-x-reverse">
                    <div class="bg-white bg-opacity-20 w-16 h-16 rounded-full overflow-hidden flex-shrink-0">
                        <img src="assets/logooo.png" alt="لوگو الکوثر" class="w-full h-full object-cover">
                    </div>
                    <div class="flex flex-col">
                        <h1 class="text-lg font-bold text-white leading-tight">شرکت الکوثر</h1>
                        <p class="text-xs text-blue-200">بایگانی فایل‌ها</p>
                    </div>
                </div>
                <button @click="sidebarOpen = false" class="lg:hidden text-white hover:text-blue-200">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            
            <!-- Search Box -->
            <div class="relative">
                <input type="text" 
                       x-model="searchQuery"
                       @input="filterFiles()"
                       placeholder="جستجوی فایل..."
                       class="w-full bg-white bg-opacity-10 border border-white border-opacity-20 rounded-xl px-4 py-3 text-white placeholder-blue-200 focus:outline-none focus:ring-2 focus:ring-white focus:ring-opacity-30">
                <i class="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-blue-200"></i>
            </div>
        </div>

        <!-- Archive Categories Navigation -->
        <nav class="flex-1 overflow-y-auto custom-scrollbar p-4 space-y-2">
            <p class="text-blue-200 text-xs font-semibold px-4 mb-3">دسته‌بندی‌ها</p>
            
            <template x-for="category in categories" :key="category.id">
                <button @click="selectedCategory = category.id"
                        :class="selectedCategory === category.id ? 'bg-white bg-opacity-20 text-white shadow-lg' : 'text-blue-100 hover:bg-white hover:bg-opacity-10'"
                        class="w-full flex items-center justify-between px-4 py-3 rounded-xl transition-all duration-200">
                    <div class="flex items-center space-x-3 space-x-reverse">
                        <i :class="category.icon" class="text-lg"></i>
                        <span class="font-medium" x-text="category.name"></span>
                    </div>
                    <span class="bg-blue-500 bg-opacity-30 text-white text-xs px-2 py-1 rounded-full" 
                          x-text="getCategoryCount(category.id)"></span>
                </button>
            </template>

            <!-- Back to Main -->
            <div class="pt-4 mt-4 border-t border-white border-opacity-20">
                <a href="index.html"
                   class="w-full flex items-center space-x-3 space-x-reverse px-4 py-3 rounded-xl text-blue-100 hover:bg-white hover:bg-opacity-10 transition-all duration-200">
                    <i class="fas fa-arrow-right text-lg"></i>
                    <span class="font-medium">بازگشت به داشبورد</span>
                </a>
            </div>
        </nav>

        <!-- Sidebar Footer -->
        <div class="p-4 border-t border-blue-500 border-opacity-30">
            <div class="bg-white bg-opacity-10 rounded-xl p-3 text-center">
                <p class="text-white text-sm font-medium mb-1">مجموع فایل‌ها</p>
                <p class="text-3xl font-bold text-white" x-text="getTotalFiles()"></p>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main :class="sidebarOpen ? 'lg:mr-80' : 'lg:mr-0'" 
          class="min-h-screen p-6 transition-all duration-300">
        
        <!-- Page Header -->
        <div class="mb-6">
            <h2 class="text-3xl font-bold text-white mb-2">بایگانی فایل‌های دریافتی</h2>
            <p class="text-blue-200 text-sm">مدیریت و دسترسی به تمام فایل‌های ارسالی از طرف نویسندگان</p>
        </div>

        <!-- Upload Section -->
        <div class="bg-white bg-opacity-10 backdrop-blur-lg rounded-2xl p-6 mb-6 border border-white border-opacity-20">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-xl font-bold text-white flex items-center">
                    <i class="fas fa-cloud-upload-alt ml-2"></i>
                    آپلود فایل جدید
                </h3>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <!-- Category Selection -->
                <div>
                    <label class="block text-white text-sm font-medium mb-2">دسته‌بندی</label>
                    <select x-model="uploadCategory" 
                            class="w-full bg-white bg-opacity-20 border border-white border-opacity-30 rounded-lg px-4 py-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-400">
                        <option value="">انتخاب دسته</option>
                        <template x-for="cat in categories" :key="cat.id">
                            <option :value="cat.id" x-text="cat.name"></option>
                        </template>
                    </select>
                    <p x-show="uploadCategory === 'correspondence' || uploadCategory === 'administrative'" 
                       class="text-yellow-300 text-xs mt-1">
                        <i class="fas fa-info-circle ml-1"></i>
                        فقط فایل‌های تصویری و PDF مجاز است
                    </p>
                </div>
                
                <!-- Author Selection -->
                <div>
                    <label class="block text-white text-sm font-medium mb-2">نویسنده</label>
                    <input type="text" 
                           x-model="uploadAuthor"
                           placeholder="نام نویسنده"
                           class="w-full bg-white bg-opacity-20 border border-white border-opacity-30 rounded-lg px-4 py-2 text-white placeholder-blue-200 focus:outline-none focus:ring-2 focus:ring-blue-400">
                </div>
                
                <!-- File Upload -->
                <div>
                    <label class="block text-white text-sm font-medium mb-2">فایل</label>
                    <input type="file" 
                           @change="handleFileUpload($event)"
                           :accept="getAcceptedFileTypes()"
                           multiple
                           class="w-full bg-white bg-opacity-20 border border-white border-opacity-30 rounded-lg px-4 py-2 text-white file:ml-4 file:py-1 file:px-3 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-500 file:text-white hover:file:bg-blue-600">
                </div>
            </div>
            
            <button @click="uploadFiles()" 
                    :disabled="!uploadCategory || !uploadAuthor || uploadQueue.length === 0"
                    :class="uploadCategory && uploadAuthor && uploadQueue.length > 0 ? 'bg-green-600 hover:bg-green-700' : 'bg-gray-500 cursor-not-allowed'"
                    class="mt-4 px-6 py-2 rounded-lg text-white font-medium transition-all duration-200">
                <i class="fas fa-upload ml-2"></i>
                آپلود <span x-show="uploadQueue.length > 0" x-text="`(${uploadQueue.length} فایل)`"></span>
            </button>
        </div>

        <!-- Files Grid -->
        <div class="bg-white bg-opacity-10 backdrop-blur-lg rounded-2xl p-6 border border-white border-opacity-20">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-xl font-bold text-white flex items-center">
                    <i class="fas fa-folder-open ml-2"></i>
                    <span x-text="getCategoryName(selectedCategory)"></span>
                </h3>
                
                <!-- View Toggle -->
                <div class="flex space-x-2 space-x-reverse">
                    <button @click="viewMode = 'grid'" 
                            :class="viewMode === 'grid' ? 'bg-blue-600' : 'bg-white bg-opacity-20'"
                            class="px-3 py-2 rounded-lg text-white hover:bg-blue-600 transition-all">
                        <i class="fas fa-th"></i>
                    </button>
                    <button @click="viewMode = 'list'" 
                            :class="viewMode === 'list' ? 'bg-blue-600' : 'bg-white bg-opacity-20'"
                            class="px-3 py-2 rounded-lg text-white hover:bg-blue-600 transition-all">
                        <i class="fas fa-list"></i>
                    </button>
                </div>
            </div>

            <!-- Grid View -->
            <div x-show="viewMode === 'grid'" 
                 class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                <template x-for="file in getFilteredFiles()" :key="file.id">
                    <div class="bg-white bg-opacity-10 rounded-xl p-4 hover:bg-opacity-20 transition-all duration-200 border border-white border-opacity-10">
                        <div class="flex items-start justify-between mb-3">
                            <div class="flex-1">
                                <div class="flex items-center mb-2">
                                    <i :class="getFileIcon(file.type)" class="text-2xl ml-2" :style="`color: ${getFileColor(file.type)}`"></i>
                                    <h4 class="text-white font-medium text-sm truncate" x-text="file.name"></h4>
                                </div>
                                <p class="text-blue-200 text-xs mb-1">
                                    <i class="fas fa-user ml-1"></i>
                                    <span x-text="file.author"></span>
                                </p>
                                <p class="text-blue-200 text-xs">
                                    <i class="fas fa-calendar ml-1"></i>
                                    <span x-text="formatDate(file.uploadDate)"></span>
                                </p>
                            </div>
                            <button @click="deleteFile(file.id)" 
                                    class="text-red-400 hover:text-red-300 transition-colors">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                        
                        <div class="flex space-x-2 space-x-reverse">
                            <button @click="downloadFile(file)" 
                                    class="flex-1 bg-blue-600 hover:bg-blue-700 text-white text-xs py-2 rounded-lg transition-all">
                                <i class="fas fa-download ml-1"></i>
                                دانلود
                            </button>
                            <button @click="viewFile(file)" 
                                    class="flex-1 bg-green-600 hover:bg-green-700 text-white text-xs py-2 rounded-lg transition-all">
                                <i class="fas fa-eye ml-1"></i>
                                مشاهده
                            </button>
                        </div>
                    </div>
                </template>
            </div>

            <!-- List View -->
            <div x-show="viewMode === 'list'" class="space-y-2">
                <template x-for="file in getFilteredFiles()" :key="file.id">
                    <div class="bg-white bg-opacity-10 rounded-xl p-4 hover:bg-opacity-20 transition-all duration-200 border border-white border-opacity-10">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center space-x-4 space-x-reverse flex-1">
                                <i :class="getFileIcon(file.type)" class="text-2xl" :style="`color: ${getFileColor(file.type)}`"></i>
                                <div class="flex-1">
                                    <h4 class="text-white font-medium" x-text="file.name"></h4>
                                    <div class="flex items-center space-x-4 space-x-reverse text-blue-200 text-xs mt-1">
                                        <span><i class="fas fa-user ml-1"></i><span x-text="file.author"></span></span>
                                        <span><i class="fas fa-calendar ml-1"></i><span x-text="formatDate(file.uploadDate)"></span></span>
                                        <span><i class="fas fa-hdd ml-1"></i><span x-text="file.size"></span></span>
                                    </div>
                                </div>
                            </div>
                            <div class="flex space-x-2 space-x-reverse">
                                <button @click="downloadFile(file)" 
                                        class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition-all">
                                    <i class="fas fa-download"></i>
                                </button>
                                <button @click="viewFile(file)" 
                                        class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg transition-all">
                                    <i class="fas fa-eye"></i>
                                </button>
                                <button @click="deleteFile(file.id)" 
                                        class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg transition-all">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </template>
            </div>

            <!-- Empty State -->
            <div x-show="getFilteredFiles().length === 0" 
                 class="text-center py-12">
                <i class="fas fa-folder-open text-6xl text-blue-300 mb-4"></i>
                <p class="text-white text-lg font-medium mb-2">فایلی یافت نشد</p>
                <p class="text-blue-200 text-sm">در این دسته‌بندی هنوز فایلی آپلود نشده است</p>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/archive.js"></script>
</body>
</html>
