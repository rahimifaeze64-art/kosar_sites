<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تست اتصال فرانت و بک‌اند</title>
    <script src="assets/libs/tailwindcss.js"></script>
    <link href="assets/fonts/vazirmatn/vazirmatn.css" rel="stylesheet">
    <style>
        body { font-family: Vazirmatn, sans-serif; }
        .log-entry { padding: 8px; margin: 4px 0; border-radius: 4px; }
        .log-success { background: #d1fae5; color: #065f46; }
        .log-error { background: #fee2e2; color: #991b1b; }
        .log-info { background: #dbeafe; color: #1e40af; }
    </style>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <h1 class="text-3xl font-bold text-gray-800 mb-4">🔌 تست اتصال فرانت و بک‌اند</h1>
            <p class="text-gray-600 mb-4">این صفحه برای تست اتصال بین فرانت و بک‌اند Django است</p>
            
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-blue-50 p-4 rounded">
                    <p class="text-sm text-gray-600">آدرس بک‌اند:</p>
                    <p class="font-bold text-blue-600">http://127.0.0.1:8000/api</p>
                </div>
                <div class="bg-green-50 p-4 rounded">
                    <p class="text-sm text-gray-600">وضعیت سرور:</p>
                    <p id="server-status" class="font-bold text-green-600">در حال بررسی...</p>
                </div>
            </div>
        </div>

        <!-- Test Buttons -->
        <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <h2 class="text-xl font-bold mb-4">تست‌های API</h2>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="testConnection()" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-3 rounded-lg font-bold">
                    1️⃣ تست اتصال پایه
                </button>
                <button onclick="testLogin()" class="bg-green-500 hover:bg-green-600 text-white px-4 py-3 rounded-lg font-bold">
                    2️⃣ تست ورود (Login)
                </button>
                <button onclick="testGetUsers()" class="bg-purple-500 hover:bg-purple-600 text-white px-4 py-3 rounded-lg font-bold">
                    3️⃣ دریافت کاربران
                </button>
                <button onclick="testGetOrders()" class="bg-orange-500 hover:bg-orange-600 text-white px-4 py-3 rounded-lg font-bold">
                    4️⃣ دریافت سفارشات
                </button>
                <button onclick="testCreateOrder()" class="bg-pink-500 hover:bg-pink-600 text-white px-4 py-3 rounded-lg font-bold">
                    5️⃣ ایجاد سفارش جدید
                </button>
                <button onclick="testDashboardStats()" class="bg-indigo-500 hover:bg-indigo-600 text-white px-4 py-3 rounded-lg font-bold">
                    6️⃣ آمار داشبورد
                </button>
            </div>
        </div>

        <!-- Log Output -->
        <div class="bg-white rounded-lg shadow-lg p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">📋 لاگ تست‌ها</h2>
                <button onclick="clearLog()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded text-sm">
                    پاک کردن لاگ
                </button>
            </div>
            <div id="log-output" class="bg-gray-50 p-4 rounded max-h-96 overflow-y-auto font-mono text-sm">
                <p class="text-gray-500">منتظر شروع تست...</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://127.0.0.1:8000/api';
        let csrfToken = null;
        let sessionCookie = null;

        function log(message, type = 'info') {
            const output = document.getElementById('log-output');
            const time = new Date().toLocaleTimeString('fa-IR');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.innerHTML = `<strong>[${time}]</strong> ${message}`;
            output.appendChild(entry);
            output.scrollTop = output.scrollHeight;
        }

        function clearLog() {
            document.getElementById('log-output').innerHTML = '<p class="text-gray-500">لاگ پاک شد</p>';
        }

        async function getCSRFToken() {
            try {
                const response = await fetch(`${API_BASE}/auth/current-user/`, {
                    credentials: 'include'
                });
                
                const cookies = document.cookie.split(';');
                for (let cookie of cookies) {
                    const [name, value] = cookie.trim().split('=');
                    if (name === 'csrftoken') {
                        csrfToken = value;
                        log(`✅ CSRF Token دریافت شد: ${value.substring(0, 10)}...`, 'success');
                        return;
                    }
                }
                log('⚠️ CSRF Token یافت نشد', 'error');
            } catch (error) {
                log(`❌ خطا در دریافت CSRF Token: ${error.message}`, 'error');
            }
        }

        async function testConnection() {
            log('🔍 شروع تست اتصال پایه...', 'info');
            try {
                const response = await fetch(`${API_BASE}/auth/current-user/`, {
                    credentials: 'include'
                });
                
                if (response.ok) {
                    log('✅ اتصال به سرور موفق!', 'success');
                    document.getElementById('server-status').textContent = '✅ آنلاین';
                    await getCSRFToken();
                } else {
                    log(`⚠️ سرور پاسخ داد اما با خطا: ${response.status}`, 'error');
                    document.getElementById('server-status').textContent = '⚠️ خطا';
                }
            } catch (error) {
                log(`❌ خطا در اتصال: ${error.message}`, 'error');
                document.getElementById('server-status').textContent = '❌ آفلاین';
            }
        }

        async function testLogin() {
            log('🔐 شروع تست ورود با کاربر manager...', 'info');
            try {
                const response = await fetch(`${API_BASE}/auth/login/`, {
                    method: 'POST',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json',
                        ...(csrfToken && { 'X-CSRFToken': csrfToken })
                    },
                    body: JSON.stringify({
                        username: 'manager',
                        password: '123456'
                    })
                });

                const data = await response.json();
                
                if (response.ok && data.success) {
                    log(`✅ ورود موفق! کاربر: ${data.user.first_name} ${data.user.last_name}`, 'success');
                    log(`📊 نقش کاربر: ${data.user.role}`, 'info');
                    await getCSRFToken();
                } else {
                    log(`❌ ورود ناموفق: ${data.error || 'خطای نامشخص'}`, 'error');
                }
            } catch (error) {
                log(`❌ خطا در ورود: ${error.message}`, 'error');
            }
        }

        async function testGetUsers() {
            log('👥 دریافت لیست کاربران...', 'info');
            try {
                const response = await fetch(`${API_BASE}/users/`, {
                    credentials: 'include',
                    headers: {
                        ...(csrfToken && { 'X-CSRFToken': csrfToken })
                    }
                });

                const data = await response.json();
                
                if (response.ok) {
                    log(`✅ ${data.length} کاربر دریافت شد`, 'success');
                    data.slice(0, 3).forEach(user => {
                        log(`  👤 ${user.first_name} ${user.last_name} - ${user.role}`, 'info');
                    });
                } else {
                    log(`❌ خطا در دریافت کاربران: ${data.detail || 'خطای نامشخص'}`, 'error');
                }
            } catch (error) {
                log(`❌ خطا: ${error.message}`, 'error');
            }
        }

        async function testGetOrders() {
            log('📋 دریافت لیست سفارشات...', 'info');
            try {
                const response = await fetch(`${API_BASE}/orders/`, {
                    credentials: 'include',
                    headers: {
                        ...(csrfToken && { 'X-CSRFToken': csrfToken })
                    }
                });

                const data = await response.json();
                
                if (response.ok) {
                    const orders = data.results || data;
                    log(`✅ ${orders.length} سفارش دریافت شد`, 'success');
                    orders.slice(0, 3).forEach(order => {
                        log(`  📦 ${order.type} - ${order.status} - ${order.university}`, 'info');
                    });
                } else {
                    log(`❌ خطا در دریافت سفارشات: ${data.detail || 'خطای نامشخص'}`, 'error');
                }
            } catch (error) {
                log(`❌ خطا: ${error.message}`, 'error');
            }
        }

        async function testCreateOrder() {
            log('➕ ایجاد سفارش تستی...', 'info');
            try {
                // First get a student user
                const usersResponse = await fetch(`${API_BASE}/users/`, {
                    credentials: 'include'
                });
                const users = await usersResponse.json();
                const student = users.find(u => u.role === 'student');
                
                if (!student) {
                    log('❌ هیچ دانشجویی یافت نشد', 'error');
                    return;
                }

                const orderData = {
                    student: student.id,
                    university: 'دانشگاه تست',
                    field: 'مهندسی کامپیوتر',
                    degree: 'ارشد',
                    type: 'نوشتن رساله',
                    deadline: '2026-06-01',
                    total_amount: 5000000,
                    description: 'سفارش تستی از فرانت'
                };

                const response = await fetch(`${API_BASE}/orders/`, {
                    method: 'POST',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json',
                        ...(csrfToken && { 'X-CSRFToken': csrfToken })
                    },
                    body: JSON.stringify(orderData)
                });

                const data = await response.json();
                
                if (response.ok) {
                    log(`✅ سفارش با موفقیت ایجاد شد! ID: ${data.id}`, 'success');
                    log(`  📦 نوع: ${data.type}`, 'info');
                    log(`  🎓 دانشگاه: ${data.university}`, 'info');
                } else {
                    log(`❌ خطا در ایجاد سفارش: ${JSON.stringify(data)}`, 'error');
                }
            } catch (error) {
                log(`❌ خطا: ${error.message}`, 'error');
            }
        }

        async function testDashboardStats() {
            log('📊 دریافت آمار داشبورد...', 'info');
            try {
                const response = await fetch(`${API_BASE}/dashboard/stats/`, {
                    credentials: 'include',
                    headers: {
                        ...(csrfToken && { 'X-CSRFToken': csrfToken })
                    }
                });

                const data = await response.json();
                
                if (response.ok) {
                    log('✅ آمار دریافت شد:', 'success');
                    log(`  📦 کل سفارشات: ${data.total_orders}`, 'info');
                    log(`  ⏳ در انتظار: ${data.pending_orders}`, 'info');
                    log(`  🔄 در حال انجام: ${data.in_progress_orders}`, 'info');
                    log(`  ✅ تکمیل شده: ${data.completed_orders}`, 'info');
                    log(`  👥 دانشجویان: ${data.total_students}`, 'info');
                } else {
                    log(`❌ خطا در دریافت آمار: ${data.detail || 'خطای نامشخص'}`, 'error');
                }
            } catch (error) {
                log(`❌ خطا: ${error.message}`, 'error');
            }
        }

        // Auto test connection on load
        window.addEventListener('load', () => {
            setTimeout(testConnection, 500);
        });
    </script>
</body>
</html>
