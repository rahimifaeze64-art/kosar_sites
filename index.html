<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>

    <meta name="apple-mobile-web-app-capable" content="yes">

                    <i class="fas fa-tasks text-lg"></i>

    <!-- Modals Container -->

    <!-- Scripts -->
    <script>
        // Debug System
        let debugLog = [];
        let debugVisible = false;
        
        // Safe debug logger
        function debugLogger(message, type = 'info', data = null) {
            try {
                const timestamp = new Date().toLocaleTimeString('fa-IR');
                const logEntry = {
                    timestamp,
                    message,
                    type,
                    data: data ? JSON.stringify(data, null, 2) : null
                };
                
                debugLog.push(logEntry);
                
                // Console log
                console.log(`[${timestamp}] ${type.toUpperCase()}: ${message}`, data || '');
                
                // Update debug panel if visible
                if (debugVisible) {
                    updateDebugPanel();
                }
                
                // Keep only last 100 entries
                if (debugLog.length > 100) {
                    debugLog = debugLog.slice(-100);
                }
            } catch (error) {
                console.error('Debug logger error:', error);
            }
        }
        
        function updateDebugPanel() {
            const content = document.getElementById('debug-content');
            if (!content) return;
            
            content.innerHTML = debugLog.slice(-20).reverse().map(entry => {
                const typeColors = {
                    info: 'text-blue-400',
                    success: 'text-green-400',
                    warning: 'text-yellow-400',
                    error: 'text-red-400'
                };
                
                return `
                    <div class="border-b border-gray-700 pb-1 mb-1">
                        <div class="flex justify-between">
                            <span class="${typeColors[entry.type] || 'text-gray-400'}">[${entry.type}]</span>
                            <span class="text-gray-500">${entry.timestamp}</span>
                        </div>
                        <div class="text-white">${entry.message}</div>
                        ${entry.data ? `<pre class="text-gray-300 text-xs mt-1 bg-gray-800 p-1 rounded overflow-x-auto">${entry.data}</pre>` : ''}
                    </div>
                `;
            }).join('');
        }
        
        function toggleDebug() {
            const panel = document.getElementById('debug-panel');
            debugVisible = !debugVisible;
            panel.style.display = debugVisible ? 'block' : 'none';
            
            if (debugVisible) {
                updateDebugPanel();
            }
        }
        
        function clearDebugLog() {
            debugLog = [];
            updateDebugPanel();
            debugLogger('Debug log cleared', 'info');
        }
        
        function exportDebugLog() {
            const dataStr = JSON.stringify(debugLog, null, 2);
            const dataBlob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `debug-log-${new Date().toISOString().slice(0,19)}.json`;
            link.click();
            URL.revokeObjectURL(url);
        }
        
        function resetAllData() {
            if (confirm('آیا مطمئن هستید؟ تمام داده‌ها پاک و با داده‌های پیش‌فرض جایگزین می‌شوند.')) {
                localStorage.removeItem(CONFIG.STORAGE_KEYS.USERS);
                localStorage.removeItem(CONFIG.STORAGE_KEYS.ORDERS);
                localStorage.removeItem(CONFIG.STORAGE_KEYS.CURRENT_USER);
                debugLogger('All data reset to defaults', 'success');
                setTimeout(() => location.reload(), 500);
            }
        }
        
        // Override console methods to capture errors
        const originalError = console.error;
        console.error = function(...args) {
            debugLogger(`Console Error: ${args.join(' ')}`, 'error', args);
            originalError.apply(console, args);
        };
        
        const originalWarn = console.warn;
        console.warn = function(...args) {
            debugLogger(`Console Warning: ${args.join(' ')}`, 'warning', args);
            originalWarn.apply(console, args);
        };
        
        // Catch unhandled errors
        window.addEventListener('error', function(e) {
            debugLogger(`Unhandled Error: ${e.message}`, 'error', {
                filename: e.filename,
                lineno: e.lineno,
                colno: e.colno,
                stack: e.error?.stack
            });
        });
        
        // Catch unhandled promise rejections
        window.addEventListener('unhandledrejection', function(e) {
            debugLogger(`Unhandled Promise Rejection: ${e.reason}`, 'error', e.reason);
        });
        
        // Initial debug message
        debugLogger('Debug system initialized', 'success');
    </script>
