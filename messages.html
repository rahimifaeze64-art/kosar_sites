<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پیام‌ها - سیستم مدیریت کوثر</title>
    
    <!-- Fonts -->
    <link rel="stylesheet" href="assets/fonts/vazirmatn/vazirmatn.css">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="assets/libs/fontawesome/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="assets/libs/tailwindcss.js"></script>
    
    <!-- Alpine.js -->
    <script defer src="assets/libs/alpine.min.js"></script>
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="bg-slate-900 text-white font-vazir">
    
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar - لیست مکالمات -->
        <div class="w-80 bg-slate-800 border-l border-slate-700 flex flex-col">
            <!-- Header -->
            <div class="p-4 border-b border-slate-700">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-xl font-bold text-white">
                        <i class="fas fa-comments text-indigo-400 ml-2"></i>
                        پیام‌ها
                    </h2>
                    <div class="flex items-center space-x-2 space-x-reverse">
                        <div id="current-user-badge" class="text-xs bg-indigo-600 text-white px-3 py-1 rounded-full">
                            <!-- Will be populated by JavaScript -->
                        </div>
                        <button onclick="window.history.back()" 
                                class="text-gray-400 hover:text-white p-2"
                                title="بازگشت">
                            <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>
                </div>
                
                <!-- Search -->
                <div class="relative">
                    <input type="text" id="search-conversations" 
                           placeholder="جستجوی مکالمات..."
                           class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2 pr-10 text-white text-sm">
                    <i class="fas fa-search absolute right-3 top-3 text-gray-400"></i>
                </div>
            </div>
            
            <!-- Conversations List -->
            <div class="flex-1 overflow-y-auto" id="conversations-list">
                <!-- Will be populated by JavaScript -->
            </div>
        </div>
        
        <!-- Main Chat Area -->
        <div class="flex-1 flex flex-col">
            <!-- Chat Header -->
            <div class="bg-slate-800 border-b border-slate-700 p-4" id="chat-header">
                <div class="text-center text-gray-400">
                    <i class="fas fa-comments text-4xl mb-2"></i>
                    <p>یک مکالمه را انتخاب کنید</p>
                </div>
            </div>
            
            <!-- Messages Area -->
            <div class="flex-1 overflow-y-auto p-4 bg-slate-900" id="messages-area">
                <!-- Will be populated by JavaScript -->
            </div>
            
            <!-- Message Input -->
            <div class="bg-slate-800 border-t border-slate-700 p-4" id="message-input-area" style="display: none;">
                <!-- Attachment Preview -->
                <div id="attachment-preview" class="mb-3" style="display: none;"></div>
                
                <!-- Voice Recording UI -->
                <div id="voice-recording-ui" class="mb-3 bg-red-500 rounded-lg p-3" style="display: none;">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center space-x-3 space-x-reverse">
                            <div class="w-3 h-3 bg-white rounded-full animate-pulse"></div>
                            <span class="text-white font-bold">در حال ضبط...</span>
                            <span id="recording-timer" class="text-white">0:00</span>
                        </div>
                        <div class="flex space-x-2 space-x-reverse">
                            <button onclick="MessagesModule.cancelRecording()" 
                                    class="bg-white text-red-500 px-3 py-1 rounded-lg text-sm font-bold hover:bg-gray-100">
                                <i class="fas fa-times ml-1"></i>
                                لغو
                            </button>
                            <button onclick="MessagesModule.stopRecording()" 
                                    class="bg-white text-red-500 px-3 py-1 rounded-lg text-sm font-bold hover:bg-gray-100">
                                <i class="fas fa-check ml-1"></i>
                                ارسال
                            </button>
                        </div>
                    </div>
                </div>
                
                <!-- Input Row -->
                <div class="flex items-end space-x-2 space-x-reverse">
                    <!-- Attach File Button -->
                    <button onclick="document.getElementById('file-input').click()" 
                            class="bg-slate-700 hover:bg-slate-600 text-gray-300 p-3 rounded-lg transition-all"
                            title="ضمیمه فایل">
                        <i class="fas fa-paperclip"></i>
                    </button>
                    <input type="file" id="file-input" class="hidden" onchange="MessagesModule.handleFileSelect(event)">
                    
                    <!-- Voice Message Button -->
                    <button id="voice-btn" onclick="MessagesModule.toggleVoiceRecording()" 
                            class="bg-slate-700 hover:bg-slate-600 text-gray-300 p-3 rounded-lg transition-all"
                            title="پیام صوتی">
                        <i class="fas fa-microphone"></i>
                    </button>
                    
                    <!-- Text Input -->
                    <textarea id="message-input" 
                              placeholder="پیام خود را بنویسید..."
                              class="flex-1 bg-slate-700 border border-slate-600 rounded-lg px-4 py-3 text-white resize-none"
                              rows="1"
                              onkeydown="MessagesModule.handleKeyDown(event)"
                              oninput="MessagesModule.autoResize(this)"></textarea>
                    
                    <!-- Send Button -->
                    <button onclick="MessagesModule.sendMessage()" 
                            class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-lg font-bold transition-all">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/data.js"></script>
    <script src="js/messages.js"></script>
    
    <script>
        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            // Initialize data first
            DataModule.initializeData();
            
            // Then initialize messages module
            MessagesModule.init();
        });
    </script>
</body>
</html>
