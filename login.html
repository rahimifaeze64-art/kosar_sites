<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود به سیستم - الکوثر للخدمات الجامعیة</title>
    <script src="assets/libs/tailwindcss.js"></script>
    <link href="assets/libs/fontawesome/css/all.min.css" rel="stylesheet">
    <link href="assets/fonts/vazirmatn/vazirmatn.css" rel="stylesheet">
    <!-- کاربران هاردکد -->
    <script src="js/hardcoded-users.js"></script>
    <style>
        body { font-family: Vazirmatn, sans-serif; }
        .gradient-bg { background: #fef08a; }
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-md">

    <!-- لوگو و عنوان -->
    <div class="text-center mb-8">
        <div class="bg-white bg-opacity-20 w-24 h-24 rounded-full mx-auto mb-4 overflow-hidden">
            <img src="assets/logooo.png" alt="لوگو" class="w-full h-full object-cover">
        </div>
        <h1 class="text-3xl font-bold text-gray-800 mb-2">شرکة الکوثر للخدمات الجامعیة</h1>
        <p class="text-gray-600">سیستم مدیریت تحصیلی</p>
    </div>

    <!-- فرم ورود -->
    <div class="bg-white rounded-2xl shadow-2xl p-8">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">ورود به سیستم</h2>

        <form id="login-form" onsubmit="handleLogin(event)" autocomplete="off">

            <!-- نام کاربری -->
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="username">
                    <i class="fas fa-user ml-2 text-yellow-600"></i>نام کاربری
                </label>
                <input type="text" id="username" name="username"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-500 text-left"
                    placeholder="نام کاربری" dir="ltr" required autocomplete="username">
            </div>

            <!-- رمز عبور -->
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="password">
                    <i class="fas fa-lock ml-2 text-yellow-600"></i>رمز عبور
                </label>
                <div class="relative">
                    <input type="password" id="password" name="password"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-500 text-left"
                        placeholder="رمز عبور" dir="ltr" required autocomplete="current-password">
                    <button type="button" onclick="togglePassword()"
                        class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                        <i class="fas fa-eye" id="eye-icon"></i>
                    </button>
                </div>
            </div>

            <!-- دکمه ورود -->
            <button type="submit" id="login-btn"
                class="w-full bg-yellow-600 hover:bg-yellow-700 active:bg-yellow-800 text-gray-900 font-bold py-3 px-4 rounded-lg transition-colors duration-200 flex items-center justify-center gap-2">
                <i class="fas fa-sign-in-alt"></i>
                <span id="btn-text">ورود</span>
            </button>
        </form>

        <!-- پیام خطا -->
        <div id="error-box" class="mt-4 p-3 bg-red-50 border border-red-300 text-red-700 rounded-lg hidden text-sm">
            <i class="fas fa-exclamation-circle ml-1"></i>
            <span id="error-text"></span>
        </div>

        <!-- راهنمای کاربران حذف شد -->
    </div>

    <!-- فوتر -->
    <p class="text-center mt-6 text-gray-600 text-sm">
        © 1403 شرکة الکوثر للخدمات الجامعیة
    </p>
</div>

<script>
// ── نمایش راهنمای کاربران از لیست هاردکد ────────────────────
(function buildHint() {
    const container = document.getElementById('users-hint');
    if (!container || typeof HARDCODED_USERS === 'undefined') return;

    const roleLabel = { manager: 'مدیر', employee: 'کارمند', agent: 'عامل' };
    const roleColor = { manager: 'text-red-600', employee: 'text-blue-600', agent: 'text-green-600' };

    HARDCODED_USERS.forEach(u => {
        const row = document.createElement('div');
        row.className = 'flex justify-between items-center py-1 border-b border-gray-100 last:border-0';
        row.innerHTML = `
            <span class="${roleColor[u.role] || ''} font-semibold w-16">${roleLabel[u.role] || u.role}</span>
            <span class="text-gray-700 flex-1 px-2">${u.name}</span>
            <code class="bg-white border border-gray-200 rounded px-2 py-0.5 text-yellow-700 text-xs cursor-pointer hover:bg-yellow-50"
                  onclick="fillLogin('${u.username}','${u.password}')"
                  title="کلیک برای ورود خودکار">
                ${u.username}
            </code>`;
        container.appendChild(row);
    });
})();

// ── کلیک روی نام کاربری → پر کردن فرم ─────────────────────
function fillLogin(username, password) {
    document.getElementById('username').value = username;
    document.getElementById('password').value = password;
    document.getElementById('username').focus();
}

// ── نمایش/پنهان رمز ──────────────────────────────────────────
function togglePassword() {
    const input = document.getElementById('password');
    const icon  = document.getElementById('eye-icon');
    if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fas fa-eye-slash';
    } else {
        input.type = 'password';
        icon.className = 'fas fa-eye';
    }
}

// ── نمایش/پنهان خطا ──────────────────────────────────────────
function showError(msg) {
    const box  = document.getElementById('error-box');
    const text = document.getElementById('error-text');
    text.textContent = msg;
    box.classList.remove('hidden');
    setTimeout(() => box.classList.add('hidden'), 6000);
}
function hideError() {
    document.getElementById('error-box').classList.add('hidden');
}

// ── حالت loading دکمه ────────────────────────────────────────
function setLoading(on) {
    const btn  = document.getElementById('login-btn');
    const text = document.getElementById('btn-text');
    if (on) {
        btn.disabled = true;
        text.textContent = 'در حال ورود...';
        btn.querySelector('i').className = 'fas fa-spinner spin';
    } else {
        btn.disabled = false;
        text.textContent = 'ورود';
        btn.querySelector('i').className = 'fas fa-sign-in-alt';
    }
}

// ── منطق اصلی ورود ───────────────────────────────────────────
async function handleLogin(event) {
    event.preventDefault();
    hideError();

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    if (!username || !password) {
        showError('نام کاربری و رمز عبور را وارد کنید');
        return;
    }

    setLoading(true);

    // ── ۱. جستجو در لیست هاردکد (اصلی‌ترین روش) ─────────────
    const user = findHardcodedUser(username, password);

    if (user) {
        // ذخیره کاربر جاری
        const sessionUser = {
            id:         user.id,
            name:       user.name,
            username:   user.username,
            role:       user.role,
            email:      user.email      || '',
            phone:      user.phone      || '',
            department: user.department || '',
            specialization: user.specialization || '',
            active:     true
        };
        localStorage.setItem('currentUser', JSON.stringify(sessionUser));
        localStorage.setItem('edu_system_current_user', JSON.stringify(sessionUser));
        console.log('✅ ورود موفق:', sessionUser.username, '|', sessionUser.role);

        // ── ۲. تلاش برای ذخیره session در Supabase (اختیاری) ─
        // اگر Supabase پیکربندی شده باشد، session را ثبت می‌کنیم
        // این مرحله اختیاری است و در صورت خطا از ورود جلوگیری نمی‌کند
        try {
            if (typeof getSupabaseClient === 'function' &&
                typeof SUPABASE_URL !== 'undefined' &&
                SUPABASE_URL !== 'YOUR_SUPABASE_URL') {

                const client = getSupabaseClient();
                if (client) {
                    const email = user.email || `${user.username}@kowsar.local`;
                    await client.auth.signInWithPassword({ email, password });
                    console.log('✅ Supabase session ثبت شد');
                }
            }
        } catch (e) {
            // مشکلی نیست — ورود هاردکد موفق بوده
            console.warn('⚠️ Supabase session (اختیاری) خطا:', e.message);
        }

        // ریدایرکت
        window.location.href = 'index.html';
        return;
    }

    // ── ۳. کاربر پیدا نشد ────────────────────────────────────
    setLoading(false);
    showError('نام کاربری یا رمز عبور اشتباه است');
    document.getElementById('password').value = '';
    document.getElementById('password').focus();
}

// ── اگر قبلاً لاگین شده، مستقیم برو به index ────────────────
(function checkSession() {
    const saved = localStorage.getItem('currentUser');
    if (saved) {
        try {
            const u = JSON.parse(saved);
            if (u && u.id && u.role) {
                window.location.href = 'index.html';
            }
        } catch(e) {
            localStorage.removeItem('currentUser');
        }
    }
})();

// Enter در فیلد username → رفتن به password
document.getElementById('username').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
        e.preventDefault();
        document.getElementById('password').focus();
    }
});
</script>
</body>
</html>
