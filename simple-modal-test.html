<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تست ساده Modal</title>
    <script src="assets/libs/tailwindcss.js"></script>
    <script src="assets/libs/alpine.min.js" defer></script>
    <link href="assets/libs/fontawesome/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Vazirmatn', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 p-8" x-data="{ showModal: null }">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-3xl font-bold text-gray-800 mb-8">تست ساده Modal</h1>
        
        <!-- Status -->
        <div class="mb-6 p-4 rounded-lg bg-blue-100 text-blue-800">
            <p><strong>وضعیت showModal:</strong> <span x-text="showModal || 'null'"></span></p>
        </div>
        
        <!-- Test Buttons -->
        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4">دکمه‌های تست</h2>
            <div class="space-y-4">
                <button @click="showModal = 'newOrder'" 
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-lg">
                    <i class="fas fa-plus ml-2"></i>
                    باز کردن Modal سفارش جدید
                </button>
                
                <button @click="showModal = 'createProject'" 
                        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white p-4 rounded-lg">
                    <i class="fas fa-project-diagram ml-2"></i>
                    باز کردن Modal پروژه جدید
                </button>
                
                <button @click="showModal = null" 
                        class="w-full bg-red-600 hover:bg-red-700 text-white p-4 rounded-lg">
                    <i class="fas fa-times ml-2"></i>
                    بستن Modal
                </button>
            </div>
        </div>
    </div>

    <!-- Simple Test Modals -->
    
    <!-- New Order Modal -->
    <div x-show="showModal === 'newOrder'" class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4" 
         @click.self="showModal = null">
        <div class="bg-white rounded-lg max-w-md w-full p-6">
            <h3 class="text-lg font-bold mb-4">سفارش جدید</h3>
            <p class="mb-4">این modal سفارش جدید است!</p>
            <div class="flex justify-end space-x-2 space-x-reverse">
                <button @click="showModal = null" class="bg-gray-500 text-white px-4 py-2 rounded">انصراف</button>
                <button @click="alert('سفارش ثبت شد!'); showModal = null" class="bg-blue-600 text-white px-4 py-2 rounded">ثبت</button>
            </div>
        </div>
    </div>
    
    <!-- Create Project Modal -->
    <div x-show="showModal === 'createProject'" class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4" 
         @click.self="showModal = null">
        <div class="bg-white rounded-lg max-w-md w-full p-6">
            <h3 class="text-lg font-bold mb-4">پروژه جدید</h3>
            <p class="mb-4">این modal پروژه جدید است!</p>
            <div class="flex justify-end space-x-2 space-x-reverse">
                <button @click="showModal = null" class="bg-gray-500 text-white px-4 py-2 rounded">انصراف</button>
                <button @click="alert('پروژه ایجاد شد!'); showModal = null" class="bg-indigo-600 text-white px-4 py-2 rounded">ایجاد</button>
            </div>
        </div>
    </div>

    <script>
        // Debug
        document.addEventListener('alpine:init', () => {
            console.log('Alpine.js initialized');
        });
        
        document.addEventListener('DOMContentLoaded', () => {
            console.log('DOM loaded');
        });
    </script>
</body>
</html>
