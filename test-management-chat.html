<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تست چت مدیریتی</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: white;
            padding: 20px;
        }
        .test-container {
            max-width: 800px;
            margin: 0 auto;
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
        }
        h1 {
            color: #6366f1;
            margin-bottom: 20px;
        }
        .test-section {
            background: #334155;
            padding: 20px;
            margin: 15px 0;
            border-radius: 8px;
        }
        button {
            background: #6366f1;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
            font-size: 14px;
        }
        button:hover {
            background: #4f46e5;
        }
        .success {
            color: #10b981;
        }
        .error {
            color: #ef4444;
        }
        .info {
            color: #60a5fa;
        }
        pre {
            background: #1e293b;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🧪 تست چت مدیریتی</h1>
        
        <div class="test-section">
            <h3>1️⃣ تست باز کردن صفحه چت</h3>
            <button onclick="testOpenChat()">باز کردن چت مدیریتی</button>
            <p id="result1" class="info"></p>
        </div>

        <div class="test-section">
            <h3>2️⃣ تست ارسال پیام متنی</h3>
            <button onclick="testSendMessage()">ارسال پیام تستی</button>
            <p id="result2" class="info"></p>
        </div>

        <div class="test-section">
            <h3>3️⃣ تست منشن کردن</h3>
            <button onclick="testMention()">ارسال پیام با منشن</button>
            <p id="result3" class="info"></p>
        </div>

        <div class="test-section">
            <h3>4️⃣ تست ذخیره و بارگذاری پیام‌ها</h3>
            <button onclick="testStorage()">تست LocalStorage</button>
            <p id="result4" class="info"></p>
            <pre id="storage-data"></pre>
        </div>

        <div class="test-section">
            <h3>5️⃣ تست شرکت‌کنندگان</h3>
            <button onclick="testParticipants()">نمایش شرکت‌کنندگان</button>
            <p id="result5" class="info"></p>
            <pre id="participants-data"></pre>
        </div>

        <div class="test-section">
            <h3>6️⃣ پاک کردن داده‌های تست</h3>
            <button onclick="clearTestData()" style="background: #ef4444;">پاک کردن همه داده‌ها</button>
            <p id="result6" class="info"></p>
        </div>
    </div>

    <script>
        // Setup test users
        function setupTestUsers() {
            const users = [
                {
                    id: 'mgr001',
                    name: 'مدیر سیستم',
                    username: 'manager',
                    role: 'manager'
                },
                {
                    id: 'emp001',
                    name: 'زهرا',
                    username: 'zahra',
                    role: 'employee'
                },
                {
                    id: 'emp002',
                    name: 'زینب',
                    username: 'fatemeh',
                    role: 'employee'
                },
                {
                    id: 'emp003',
                    name: 'فرزاد',
                    username: 'farzad',
                    role: 'employee'
                }
            ];
            
            localStorage.setItem('users', JSON.stringify(users));
            localStorage.setItem('currentUser', JSON.stringify(users[0])); // Set as manager
        }

        function testOpenChat() {
            setupTestUsers();
            window.open('management-chat.html', '_blank', 'width=1200,height=800');
            document.getElementById('result1').innerHTML = '<span class="success">✓ صفحه چت در پنجره جدید باز شد</span>';
        }

        function testSendMessage() {
            setupTestUsers();
            const messages = JSON.parse(localStorage.getItem('managesChat_messages') || '[]');
            
            const testMessage = {
                id: Date.now(),
                senderId: 'mgr001',
                senderName: 'مدیر سیستم',
                senderRole: 'manager',
                text: 'این یک پیام تستی است',
                type: 'text',
                timestamp: new Date().toISOString(),
                mentions: [],
                relatedTaskId: null
            };
            
            messages.push(testMessage);
            localStorage.setItem('managesChat_messages', JSON.stringify(messages));
            
            document.getElementById('result2').innerHTML = '<span class="success">✓ پیام تستی ذخیره شد (تعداد کل: ' + messages.length + ')</span>';
        }

        function testMention() {
            setupTestUsers();
            const messages = JSON.parse(localStorage.getItem('managesChat_messages') || '[]');
            
            const testMessage = {
                id: Date.now(),
                senderId: 'mgr001',
                senderName: 'مدیر سیستم',
                senderRole: 'manager',
                text: 'سلام @zahra و @fatemeh لطفا این وظیفه را بررسی کنید',
                type: 'text',
                timestamp: new Date().toISOString(),
                mentions: ['zahra', 'fatemeh'],
                relatedTaskId: null
            };
            
            messages.push(testMessage);
            localStorage.setItem('managesChat_messages', JSON.stringify(messages));
            
            document.getElementById('result3').innerHTML = '<span class="success">✓ پیام با منشن ذخیره شد (منشن شده: zahra, fatemeh)</span>';
        }

        function testStorage() {
            setupTestUsers();
            const messages = JSON.parse(localStorage.getItem('managesChat_messages') || '[]');
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            
            const data = {
                totalMessages: messages.length,
                totalUsers: users.length,
                lastMessage: messages[messages.length - 1] || null
            };
            
            document.getElementById('result4').innerHTML = '<span class="success">✓ داده‌ها از LocalStorage بارگذاری شد</span>';
            document.getElementById('storage-data').textContent = JSON.stringify(data, null, 2);
        }

        function testParticipants() {
            setupTestUsers();
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const participants = users.filter(u => u.role === 'employee' || u.role === 'manager');
            
            document.getElementById('result5').innerHTML = '<span class="success">✓ تعداد شرکت‌کنندگان: ' + participants.length + '</span>';
            document.getElementById('participants-data').textContent = JSON.stringify(participants, null, 2);
        }

        function clearTestData() {
            if (confirm('آیا مطمئن هستید که می‌خواهید تمام داده‌های تست را پاک کنید؟')) {
                localStorage.removeItem('managesChat_messages');
                localStorage.removeItem('users');
                localStorage.removeItem('currentUser');
                document.getElementById('result6').innerHTML = '<span class="success">✓ تمام داده‌های تست پاک شد</span>';
            }
        }

        // Auto setup on load
        window.onload = function() {
            setupTestUsers();
            console.log('Test environment ready!');
        };
    </script>
</body>
</html>
