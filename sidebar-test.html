<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تست ساید بار</title>
    <script src="assets/libs/tailwindcss.js"></script>
    <script src="assets/libs/alpine.min.js" defer></script>
    <link href="assets/libs/fontawesome/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Vazirmatn', sans-serif;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            background-size: 200% 200%;
            animation: gradientShift 15s ease infinite;
        }
        
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-900 via-indigo-900 to-blue-800 min-h-screen" x-data="{ sidebarOpen: window.innerWidth >= 1024, currentPage: 'dashboard' }">
    
    <!-- Sidebar Toggle Button (Mobile) -->
    <button @click="sidebarOpen = !sidebarOpen" 
            class="fixed top-4 right-4 z-50 bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-lg shadow-lg lg:hidden">
        <i class="fas fa-bars text-xl"></i>
    </button>

    <!-- Sidebar Overlay -->
    <div x-show="sidebarOpen" 
         @click="sidebarOpen = false"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         class="fixed inset-0 bg-black bg-opacity-50 z-40 lg:hidden"></div>

    <!-- Sidebar -->
    <aside :class="sidebarOpen ? 'translate-x-0' : 'translate-x-full'"
           class="fixed top-0 right-0 h-full w-80 bg-gradient-to-b from-blue-600 via-blue-700 to-blue-800 shadow-2xl z-50 transition-all duration-300 ease-in-out flex flex-col">
        
        <!-- Sidebar Toggle Button (Desktop - Always Visible) -->
        <button @click="sidebarOpen = !sidebarOpen"
                :class="sidebarOpen ? 'left-0' : 'left-[-40px]'"
                class="hidden lg:block absolute top-1/2 transform -translate-y-1/2 bg-blue-600 hover:bg-blue-700 text-white p-2 rounded-l-lg shadow-lg transition-all duration-300 z-10">
            <i class="fas" :class="sidebarOpen ? 'fa-chevron-right' : 'fa-chevron-left'"></i>
        </button>
        
        <!-- Sidebar Header -->
        <div class="p-6 border-b border-blue-500 border-opacity-30">
            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center space-x-3 space-x-reverse">
                    <div class="bg-white bg-opacity-20 p-3 rounded-xl">
                        <i class="fas fa-graduation-cap text-white text-2xl"></i>
                    </div>
                    <h1 class="text-xl font-bold text-white">سیستم مدیریت</h1>
                </div>
                <button @click="sidebarOpen = false" class="lg:hidden text-white hover:text-blue-200">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            
            <!-- Quick Search -->
            <div class="relative">
                <input type="text" 
                       placeholder="جستجوی سریع..."
                       class="w-full bg-white bg-opacity-10 border border-white border-opacity-20 rounded-xl px-4 py-3 text-white placeholder-blue-200 focus:outline-none focus:ring-2 focus:ring-white focus:ring-opacity-30">
                <i class="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-blue-200"></i>
            </div>
        </div>

        <!-- Sidebar Navigation -->
        <nav class="flex-1 overflow-y-auto custom-scrollbar p-4 space-y-2">
            <!-- Dashboard -->
            <button @click="currentPage = 'dashboard'; sidebarOpen = false"
                    :class="currentPage === 'dashboard' ? 'bg-white bg-opacity-20 text-white shadow-lg' : 'text-blue-100 hover:bg-white hover:bg-opacity-10'"
                    class="w-full flex items-center space-x-3 space-x-reverse px-4 py-3 rounded-xl transition-all duration-200">
                <i class="fas fa-tachometer-alt text-lg"></i>
                <span class="font-medium">داشبورد</span>
            </button>

            <button @click="currentPage = 'tasks'; sidebarOpen = false"
                    :class="currentPage === 'tasks' ? 'bg-white bg-opacity-20 text-white shadow-lg' : 'text-blue-100 hover:bg-white hover:bg-opacity-10'"
                    class="w-full flex items-center space-x-3 space-x-reverse px-4 py-3 rounded-xl transition-all duration-200">
                <i class="fas fa-tasks text-lg"></i>
                <span class="font-medium">مدیریت وظایف</span>
            </button>

            <button @click="currentPage = 'messages'; sidebarOpen = false"
                    :class="currentPage === 'messages' ? 'bg-white bg-opacity-20 text-white shadow-lg' : 'text-blue-100 hover:bg-white hover:bg-opacity-10'"
                    class="w-full flex items-center space-x-3 space-x-reverse px-4 py-3 rounded-xl transition-all duration-200">
                <i class="fas fa-comments text-lg"></i>
                <span class="font-medium">پیام‌ها</span>
            </button>

            <button @click="currentPage = 'analytics'; sidebarOpen = false"
                    :class="currentPage === 'analytics' ? 'bg-white bg-opacity-20 text-white shadow-lg' : 'text-blue-100 hover:bg-white hover:bg-opacity-10'"
                    class="w-full flex items-center space-x-3 space-x-reverse px-4 py-3 rounded-xl transition-all duration-200">
                <i class="fas fa-chart-bar text-lg"></i>
                <span class="font-medium">مدیریت کاربران</span>
            </button>

            <!-- Shortcuts Section -->
            <div class="pt-4 mt-4 border-t border-white border-opacity-20">
                <p class="text-blue-200 text-xs font-semibold px-4 mb-2">میانبرها</p>
                
                <button @click="currentPage = 'orders'; sidebarOpen = false"
                        :class="currentPage === 'orders' ? 'bg-white bg-opacity-20 text-white shadow-lg' : 'text-blue-100 hover:bg-white hover:bg-opacity-10'"
                        class="w-full flex items-center space-x-3 space-x-reverse px-4 py-3 rounded-xl transition-all duration-200">
                    <i class="fas fa-clipboard-list text-lg"></i>
                    <span class="font-medium">سفارشات</span>
                </button>

                <button class="w-full flex items-center space-x-3 space-x-reverse px-4 py-3 rounded-xl text-blue-100 hover:bg-white hover:bg-opacity-10 transition-all duration-200">
                    <i class="fas fa-question-circle text-lg"></i>
                    <span class="font-medium">راهنما</span>
                </button>

                <button @click="currentPage = 'settings'; sidebarOpen = false"
                        :class="currentPage === 'settings' ? 'bg-white bg-opacity-20 text-white shadow-lg' : 'text-blue-100 hover:bg-white hover:bg-opacity-10'"
                        class="w-full flex items-center space-x-3 space-x-reverse px-4 py-3 rounded-xl transition-all duration-200">
                    <i class="fas fa-cog text-lg"></i>
                    <span class="font-medium">تنظیمات</span>
                </button>
            </div>
        </nav>

        <!-- Sidebar Footer (User Profile) -->
        <div class="p-4 border-t border-blue-500 border-opacity-30">
            <div class="flex items-center space-x-3 space-x-reverse bg-white bg-opacity-10 rounded-xl p-3">
                <div class="relative">
                    <img src="https://ui-avatars.com/api/?name=User&background=4f46e5&color=fff&size=40" 
                         class="w-10 h-10 rounded-full border-2 border-white">
                    <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-400 rounded-full border-2 border-blue-700"></div>
                </div>
                <div class="flex-1">
                    <p class="text-white font-medium text-sm">دکتر تقی زاده</p>
                    <p class="text-blue-200 text-xs">مدیر سیستم</p>
                </div>
                <button class="text-white hover:text-blue-200">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main :class="sidebarOpen ? 'lg:mr-80' : 'lg:mr-0'" 
          class="min-h-screen p-6 transition-all duration-300">
        <!-- Page Header -->
        <div class="mb-6">
            <h2 class="text-3xl font-bold text-white mb-2" x-text="currentPage === 'dashboard' ? 'داشبورد' : currentPage === 'tasks' ? 'مدیریت وظایف' : currentPage === 'orders' ? 'سفارشات' : 'صفحه'"></h2>
            <p class="text-blue-200 text-sm">خوش آمدید به سیستم مدیریت تحصیلی</p>
        </div>

        <!-- Content Cards -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-6">
            <!-- Card 1 -->
            <div class="bg-white bg-opacity-10 backdrop-blur-lg rounded-2xl p-6 border border-white border-opacity-20 hover:bg-opacity-20 transition-all duration-300">
                <div class="flex items-center justify-between mb-4">
                    <div class="bg-blue-500 bg-opacity-30 p-3 rounded-xl">
                        <i class="fas fa-clipboard-list text-white text-2xl"></i>
                    </div>
                    <span class="text-white text-2xl font-bold">24</span>
                </div>
                <h3 class="text-white font-semibold mb-1">سفارشات فعال</h3>
                <p class="text-blue-200 text-sm">در حال پردازش</p>
            </div>

            <!-- Card 2 -->
            <div class="bg-white bg-opacity-10 backdrop-blur-lg rounded-2xl p-6 border border-white border-opacity-20 hover:bg-opacity-20 transition-all duration-300">
                <div class="flex items-center justify-between mb-4">
                    <div class="bg-green-500 bg-opacity-30 p-3 rounded-xl">
                        <i class="fas fa-check-circle text-white text-2xl"></i>
                    </div>
                    <span class="text-white text-2xl font-bold">156</span>
                </div>
                <h3 class="text-white font-semibold mb-1">تکمیل شده</h3>
                <p class="text-blue-200 text-sm">این ماه</p>
            </div>

            <!-- Card 3 -->
            <div class="bg-white bg-opacity-10 backdrop-blur-lg rounded-2xl p-6 border border-white border-opacity-20 hover:bg-opacity-20 transition-all duration-300">
                <div class="flex items-center justify-between mb-4">
                    <div class="bg-yellow-500 bg-opacity-30 p-3 rounded-xl">
                        <i class="fas fa-clock text-white text-2xl"></i>
                    </div>
                    <span class="text-white text-2xl font-bold">8</span>
                </div>
                <h3 class="text-white font-semibold mb-1">در انتظار</h3>
                <p class="text-blue-200 text-sm">نیاز به بررسی</p>
            </div>
        </div>
        
        <!-- Quick Actions Section -->
        <div class="bg-white bg-opacity-10 backdrop-blur-lg rounded-2xl p-6 border border-white border-opacity-20">
            <h3 class="text-xl font-bold text-white mb-4">عملیات سریع</h3>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
                <button class="bg-indigo-600 hover:bg-indigo-700 text-white p-4 rounded-lg text-center transition-all">
                    <i class="fas fa-plus text-2xl mb-2"></i>
                    <p class="text-sm">پروژه جدید</p>
                </button>
                <button class="bg-green-600 hover:bg-green-700 text-white p-4 rounded-lg text-center transition-all">
                    <i class="fas fa-user-plus text-2xl mb-2"></i>
                    <p class="text-sm">کاربر جدید</p>
                </button>
                <button class="bg-yellow-600 hover:bg-yellow-700 text-white p-4 rounded-lg text-center transition-all">
                    <i class="fas fa-tasks text-2xl mb-2"></i>
                    <p class="text-sm">مدیریت سفارشات</p>
                </button>
                <button class="bg-purple-600 hover:bg-purple-700 text-white p-4 rounded-lg text-center transition-all">
                    <i class="fas fa-users text-2xl mb-2"></i>
                    <p class="text-sm">مدیریت کاربران</p>
                </button>
            </div>
            
            <!-- New Order Button - Full Width -->
            <button class="w-full bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white px-6 py-4 rounded-xl shadow-lg flex items-center justify-center space-x-3 space-x-reverse transition-all duration-200 transform hover:scale-105">
                <i class="fas fa-plus-circle text-2xl"></i>
                <span class="text-lg font-bold">ایجاد سفارش جدید</span>
            </button>
        </div>
    </main>

</body>
</html>
