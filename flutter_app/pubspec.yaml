name: edu_system_app
description: اپلیکیشن سیستم مدیریت تحصیلی
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # WebView
  webview_flutter: ^4.4.2
  
  # اشتراک‌گذاری فایل
  receive_sharing_intent: ^1.5.3
  share_plus: ^7.2.1
  
  # دسترسی به فایل‌ها
  file_picker: ^6.1.1
  path_provider: ^2.1.1
  
  # HTTP برای آپلود
  http: ^1.1.2
  dio: ^5.4.0
  
  # مدیریت مجوزها
  permission_handler: ^11.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/icon.png
  
  # آیکون اپ
  # assets:
  #   - assets/logo.png
