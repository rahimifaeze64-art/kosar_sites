<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Test</title>
    <script src="assets/libs/tailwindcss.js"></script>
    <script src="assets/libs/alpine.min.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Vazirmatn', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 p-8" x-data="simpleApp()">
    <div class="max-w-2xl mx-auto">
        <div class="bg-white rounded-lg shadow-lg p-6">
            <h1 class="text-2xl font-bold text-center text-blue-600 mb-6">تست ساده سیستم</h1>
            
            <div class="space-y-4">
                <div class="p-4 bg-blue-50 rounded-lg">
                    <h3 class="font-bold">کاربر فعلی:</h3>
                    <p x-text="currentUser.name"></p>
                    <p x-text="currentUser.role"></p>
                </div>
                
                <div class="p-4 bg-green-50 rounded-lg">
                    <h3 class="font-bold">تعداد سفارشات:</h3>
                    <p x-text="orders.length"></p>
                </div>
                
                <div class="p-4 bg-yellow-50 rounded-lg">
                    <h3 class="font-bold">تعداد کاربران:</h3>
                    <p x-text="users.length"></p>
                </div>
                
                <button @click="testFunction()" 
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded-lg">
                    تست عملکرد
                </button>
                
                <div x-show="testResult" class="p-4 bg-gray-100 rounded-lg">
                    <h3 class="font-bold">نتیجه تست:</h3>
                    <p x-text="testResult"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Simple debug logger
        function debugLogger(message, type = 'info', data = null) {
            console.log(`[${type}] ${message}`, data || '');
        }
        
        // Simple app
        function simpleApp() {
            return {
                currentUser: {
                    id: 'mgr001',
                    name: 'دکتر تقی زاده',
                    role: 'مدیر'
                },
                orders: [],
                users: [],
                testResult: '',
                
                init() {
                    debugLogger('Simple app initialized');
                    this.loadData();
                },
                
                loadData() {
                    try {
                        // Load sample data
                        this.orders = [
                            { id: 1, name: 'سفارش تست 1' },
                            { id: 2, name: 'سفارش تست 2' }
                        ];
                        
                        this.users = [
                            { id: 1, name: 'کاربر 1' },
                            { id: 2, name: 'کاربر 2' },
                            { id: 3, name: 'کاربر 3' }
                        ];
                        
                        debugLogger('Data loaded successfully');
                    } catch (error) {
                        debugLogger('Error loading data', 'error', error);
                    }
                },
                
                testFunction() {
                    try {
                        this.testResult = `تست موفق! ${new Date().toLocaleTimeString('fa-IR')}`;
                        debugLogger('Test function executed successfully');
                    } catch (error) {
                        this.testResult = `خطا در تست: ${error.message}`;
                        debugLogger('Error in test function', 'error', error);
                    }
                }
            }
        }
    </script>
</body>
</html>
