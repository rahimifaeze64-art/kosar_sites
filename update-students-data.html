<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>به‌روزرسانی داده‌های دانشجویان</title>
    <script src="assets/libs/tailwindcss.js"></script>
    <link href="assets/fonts/vazirmatn/vazirmatn.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-lg shadow-lg max-w-2xl w-full p-8">
        <h1 class="text-3xl font-bold text-gray-800 mb-6 text-center">
            <i class="fas fa-sync-alt text-blue-600 ml-2"></i>
            به‌روزرسانی داده‌های دانشجویان
        </h1>
        
        <div class="mb-6 p-4 bg-blue-50 border border-blue-200 rounded-lg">
            <p class="text-gray-700 mb-2">این صفحه localStorage را با 20 دانشجوی جدید به‌روز می‌کند.</p>
            <p class="text-sm text-gray-600">دانشجویان قبلی حذف شده و 20 دانشجوی جدید جایگزین می‌شوند.</p>
        </div>
        
        <div id="status" class="mb-6 p-4 bg-gray-50 rounded-lg min-h-[200px]">
            <p class="text-gray-600">آماده برای به‌روزرسانی...</p>
        </div>
        
        <div class="flex gap-4">
            <button onclick="updateStudentsData()" 
                    class="flex-1 bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-medium transition-all">
                <i class="fas fa-sync-alt ml-2"></i>
                به‌روزرسانی داده‌ها
            </button>
            
            <button onclick="clearAndUpdate()" 
                    class="flex-1 bg-red-600 hover:bg-red-700 text-white px-6 py-3 rounded-lg font-medium transition-all">
                <i class="fas fa-trash ml-2"></i>
                پاک کردن و به‌روزرسانی
            </button>
        </div>
        
        <div class="mt-6 text-center">
            <a href="index.html" class="text-blue-600 hover:text-blue-700 text-sm">
                <i class="fas fa-arrow-right ml-1"></i>
                بازگشت به صفحه اصلی
            </a>
        </div>
    </div>

    <!-- Load required scripts -->
    <script src="js/config.js"></script>
    <script src="js/data.js"></script>
    <script src="assets/libs/fontawesome/css/all.min.css"></script>
    
    <script>
        function log(message, type = 'info') {
            const statusDiv = document.getElementById('status');
            const colors = {
                info: 'text-blue-600',
                success: 'text-green-600',
                error: 'text-red-600',
                warning: 'text-yellow-600'
            };
            
            const icons = {
                info: 'fa-info-circle',
                success: 'fa-check-circle',
                error: 'fa-times-circle',
                warning: 'fa-exclamation-triangle'
            };
            
            const timestamp = new Date().toLocaleTimeString('fa-IR');
            statusDiv.innerHTML += `
                <div class="mb-2 ${colors[type]}">
                    <i class="fas ${icons[type]} ml-1"></i>
                    <span class="text-sm">[${timestamp}]</span>
                    <span>${message}</span>
                </div>
            `;
            statusDiv.scrollTop = statusDiv.scrollHeight;
        }
        
        function clearAndUpdate() {
            log('شروع پاک‌سازی کامل...', 'warning');
            
            // Clear all localStorage
            localStorage.clear();
            log('localStorage پاک شد', 'success');
            
            // Now update
            updateStudentsData();
        }
        
        function updateStudentsData() {
            try {
                log('شروع به‌روزرسانی داده‌های دانشجویان...', 'info');
                
                // Get current users or default
                let users = [];
                const storedUsers = localStorage.getItem(CONFIG.STORAGE_KEYS.USERS);
                
                if (storedUsers) {
                    users = JSON.parse(storedUsers);
                    log(`${users.length} کاربر موجود در localStorage یافت شد`, 'info');
                    
                    // Remove old students
                    const oldStudentCount = users.filter(u => u.role === 'student').length;
                    users = users.filter(u => u.role !== 'student');
                    log(`${oldStudentCount} دانشجوی قدیمی حذف شد`, 'warning');
                } else {
                    log('localStorage خالی است، ایجاد داده‌های جدید...', 'info');
                }
                
                // Get new students from DataModule
                const allDefaultUsers = DataModule.getDefaultUsers();
                const newStudents = allDefaultUsers.filter(u => u.role === 'student');
                
                log(`${newStudents.length} دانشجوی جدید آماده اضافه شدن`, 'info');
                
                // Add new students
                users = users.concat(newStudents);
                
                // Save to localStorage
                localStorage.setItem(CONFIG.STORAGE_KEYS.USERS, JSON.stringify(users));
                
                log(`✅ موفق! ${newStudents.length} دانشجو به localStorage اضافه شد`, 'success');
                log(`📊 مجموع کاربران: ${users.length}`, 'info');
                
                // Show summary
                const studentsByRole = users.reduce((acc, u) => {
                    acc[u.role] = (acc[u.role] || 0) + 1;
                    return acc;
                }, {});
                
                log('📈 خلاصه کاربران:', 'info');
                Object.entries(studentsByRole).forEach(([role, count]) => {
                    log(`  - ${role}: ${count}`, 'info');
                });
                
                log('✅ به‌روزرسانی با موفقیت انجام شد!', 'success');
                log('🔄 لطفاً صفحه اصلی را رفرش کنید', 'warning');
                
            } catch (error) {
                log(`❌ خطا: ${error.message}`, 'error');
                console.error('Error updating students:', error);
            }
        }
        
        // Show initial info
        window.addEventListener('DOMContentLoaded', () => {
            const storedUsers = localStorage.getItem(CONFIG.STORAGE_KEYS.USERS);
            if (storedUsers) {
                const users = JSON.parse(storedUsers);
                const students = users.filter(u => u.role === 'student');
                log(`📊 وضعیت فعلی: ${students.length} دانشجو در localStorage`, 'info');
            } else {
                log('📊 localStorage خالی است', 'warning');
            }
        });
    </script>
</body>
</html>
