<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نمای شیت - پیگیری پیشرفت دانشجویان</title>
    <script src="assets/libs/tailwindcss.js"></script>
    <link href="assets/fonts/vazirmatn/vazirmatn.css" rel="stylesheet">
    <style>
        * {
            font-family: 'Vazirmatn', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }
        
        .progress-circle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .progress-circle:hover {
            transform: scale(1.15);
        }
        
        .progress-circle.completed {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            box-shadow: 0 3px 10px rgba(16, 185, 129, 0.5);
        }
        
        .progress-circle.incomplete {
            background: linear-gradient(135deg, #f87171, #ef4444);
            color: white;
            box-shadow: 0 3px 10px rgba(239, 68, 68, 0.5);
        }
        
        .progress-circle.current {
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
            color: white;
            box-shadow: 0 3px 15px rgba(59, 130, 246, 0.6);
            animation: pulse-current 2s infinite;
        }
        
        @keyframes pulse-current {
            0%, 100% { box-shadow: 0 3px 15px rgba(59, 130, 246, 0.6); }
            50% { box-shadow: 0 3px 25px rgba(59, 130, 246, 1); }
        }
        
        .sheet-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            table-layout: fixed;
        }
        
        .sheet-table thead th {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            padding: 10px 4px;
            font-size: 10px;
            font-weight: bold;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 10;
            border-left: 1px solid rgba(255,255,255,0.2);
            vertical-align: top;
            min-width: 45px;
        }
        
        .sheet-table thead th:first-child {
            position: sticky;
            right: 0;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            z-index: 11;
            border-left: none;
            min-width: 160px;
        }
        
        .sheet-table thead th:last-child {
            min-width: 50px;
        }
        
        .sheet-table tbody tr:hover {
            background: #f1f5f9;
        }
        
        .sheet-table tbody td {
            padding: 8px 4px;
            text-align: center;
            border-bottom: 1px solid #e5e7eb;
            vertical-align: middle;
        }
        
        .sheet-table tbody td.student-cell {
            position: sticky;
            right: 0;
            background: white;
            text-align: right;
            padding: 8px 10px;
        }
        
        .sheet-table tbody tr:hover td.student-cell {
            background: #f1f5f9;
        }
        
        .stage-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        
        .stage-num {
            background: rgba(255,255,255,0.2);
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
        }
        
        .stage-name {
            font-size: 8px;
            line-height: 1.2;
            max-width: 45px;
            word-wrap: break-word;
        }
        
        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 12px;
        }
        
        .table-wrapper {
            overflow: auto;
            max-height: calc(100vh - 320px);
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .path-tab {
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
            font-size: 13px;
        }
        
        .path-tab.active {
            border-color: #3b82f6;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }
        
        .filter-btn.active {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border-color: #2563eb;
        }
    </style>
</head>
<body class="min-h-screen p-4">
    <div class="max-w-full mx-auto">
        <!-- Header -->
        <div class="bg-white rounded-xl shadow-lg p-4 mb-3">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <a href="index.html" class="text-gray-400 hover:text-blue-600">
                        <i class="fas fa-arrow-right text-lg"></i>
                    </a>
                    <div>
                        <h1 class="text-lg font-bold text-gray-800">
                            <i class="fas fa-th-list text-blue-600 ml-2"></i>
                            نمای شیت
                        </h1>
                        <p class="text-[10px] text-gray-500">کلیک برای تغییر وضعیت: 🔴 → 🔵 → 🟢</p>
                    </div>
                </div>
                
                <div class="flex items-center gap-2">
                    <button onclick="saveAllProgress()" class="bg-green-600 hover:bg-green-700 text-white px-3 py-1.5 rounded-lg text-sm font-medium">
                        <i class="fas fa-save ml-1"></i>
                        ذخیره
                    </button>
                    <button onclick="exportToExcel()" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded-lg text-sm font-medium">
                        <i class="fas fa-file-excel ml-1"></i>
                        خروجی
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Path Tabs -->
        <div class="bg-white rounded-xl shadow p-3 mb-3">
            <div class="flex gap-2 overflow-x-auto">
                <div onclick="selectPath('educational')" id="tab-educational" 
                     class="path-tab bg-indigo-100 text-indigo-800 active flex-shrink-0">
                    <i class="fas fa-graduation-cap ml-1"></i>
                    مراحل تحصیلی (۲۲)
                </div>
                <div onclick="selectPath('defense')" id="tab-defense" 
                     class="path-tab bg-blue-100 text-blue-800 flex-shrink-0">
                    <i class="fas fa-shield-alt ml-1"></i>
                    گردش دفاع (۱۲)
                </div>
                <div onclick="selectPath('requirements')" id="tab-requirements" 
                     class="path-tab bg-emerald-100 text-emerald-800 flex-shrink-0">
                    <i class="fas fa-tasks ml-1"></i>
                    ملزومات (۸)
                </div>
            </div>
        </div>
        
        <!-- Stats -->
        <div class="grid grid-cols-4 gap-2 mb-3">
            <div class="bg-white rounded-lg p-3 shadow text-center">
                <p class="text-[10px] text-gray-500">کل</p>
                <p class="text-xl font-bold text-gray-800" id="total-students">0</p>
            </div>
            <div class="bg-white rounded-lg p-3 shadow text-center">
                <p class="text-[10px] text-gray-500">میانگین</p>
                <p class="text-xl font-bold text-green-600" id="avg-progress">0%</p>
            </div>
            <div class="bg-white rounded-lg p-3 shadow text-center">
                <p class="text-[10px] text-gray-500">در حال انجام</p>
                <p class="text-xl font-bold text-blue-600" id="in-progress-count">0</p>
            </div>
            <div class="bg-white rounded-lg p-3 shadow text-center">
                <p class="text-[10px] text-gray-500">تکمیل</p>
                <p class="text-xl font-bold text-purple-600" id="completed-count">0</p>
            </div>
        </div>
        
        <!-- Filter & Search -->
        <div class="bg-white rounded-xl shadow p-3 mb-3">
            <div class="flex gap-2 items-center">
                <input type="text" id="search-input" placeholder="جستجو..." 
                       class="flex-1 px-3 py-1.5 border-2 border-gray-200 rounded-lg text-sm focus:outline-none focus:border-blue-500"
                       oninput="filterStudents()">
                <button onclick="setFilter('all')" class="filter-btn active px-3 py-1.5 rounded-lg border-2 border-gray-200 text-xs" id="filter-all">همه</button>
                <button onclick="setFilter('in-progress')" class="filter-btn px-3 py-1.5 rounded-lg border-2 border-gray-200 text-xs" id="filter-in-progress">در حال انجام</button>
                <button onclick="setFilter('completed')" class="filter-btn px-3 py-1.5 rounded-lg border-2 border-gray-200 text-xs" id="filter-completed">تکمیل</button>
            </div>
        </div>
        
        <!-- Legend -->
        <div class="bg-white rounded-lg p-2 mb-3 shadow flex items-center justify-center gap-6 text-xs">
            <div class="flex items-center gap-1">
                <div class="progress-circle incomplete" style="width: 22px; height: 22px; font-size: 10px;"><i class="fas fa-times"></i></div>
                <span>تکمیل نشده</span>
            </div>
            <div class="flex items-center gap-1">
                <div class="progress-circle current" style="width: 22px; height: 22px; font-size: 10px;"><i class="fas fa-spinner fa-spin"></i></div>
                <span>فعلی</span>
            </div>
            <div class="flex items-center gap-1">
                <div class="progress-circle completed" style="width: 22px; height: 22px; font-size: 10px;"><i class="fas fa-check"></i></div>
                <span>تکمیل</span>
            </div>
        </div>
        
        <!-- Main Table -->
        <div class="table-wrapper">
            <table class="sheet-table" id="sheet-table">
                <thead id="table-head">
                    <!-- Will be rendered by JS -->
                </thead>
                <tbody id="table-body">
                    <!-- Will be rendered by JS -->
                </tbody>
            </table>
        </div>
    </div>
    
    <link href="assets/libs/fontawesome/css/all.min.css" rel="stylesheet">
    
    <script>
        const STEPS = {
            educational: ['محضر و اصالت', 'تنزیل نمره', 'تعدیل', 'ایرانداک خطه', 'ایرانداک رساله', 'مدرک لغت', 'ایجاد کردش', 'حاتمی', 'بارگزاری لغت', 'آزفا', 'ترجمه به اسماعیلی', 'دادگر', 'ارسال کد به تهران', 'وثیقه', 'تصدیق', 'تنضید', 'استلال', 'تجلید', 'ختم تجلید', 'قطعی', 'مدارک سابقه', 'ارسال'],
            defense: ['لوح', 'دستگاه', 'بارگزاری', 'امتیاز', 'چاپ', 'دفتر', 'پیش دفاع', 'دفاع', 'داوری', 'تجدید نظر', 'اصلاحیه', 'قطعی'],
            requirements: ['مدارک هویتی', 'عکس پرسنلی', 'کپی پاسپورت', 'کپی ویزا', 'کارت دانشجویی', 'معرفی نامه', 'کارنامه تحصیلی', 'رزومه علمی']
        };
        
        const STATUS_INCOMPLETE = 0;
        const STATUS_CURRENT = 1;
        const STATUS_COMPLETED = 2;
        
        let currentPath = 'educational';
        let students = [];
        let currentFilter = 'all';
        let searchTerm = '';
        
        document.addEventListener('DOMContentLoaded', () => {
            loadStudents();
            renderTable();
            updateStats();
        });
        
        function loadStudents() {
            const sample = [
                { id: 'std001', name: 'قاسم محمود حسن بغدادی', major: 'حقوق محض', avatar: 'ق' },
                { id: 'std002', name: 'حسن یاسر کرار حسینی', major: 'حقوق عمومی', avatar: 'ح' },
                { id: 'std003', name: 'علی عبدالله صالح نجفی', major: 'حقوق خصوصی', avatar: 'ع' },
                { id: 'std004', name: 'زینب حسین جاسم موسوی', major: 'حقوق بین‌الملل', avatar: 'ز' },
                { id: 'std005', name: 'محمد جواد کاظم عبدالرضا', major: 'حقوق محض', avatar: 'م' },
                { id: 'std006', name: 'سارا محمود رضا الموصلی', major: 'حقوق عمومی', avatar: 'س' }
            ];
            
            try {
                const stored = localStorage.getItem('students_data');
                if (stored) {
                    Object.values(JSON.parse(stored)).forEach(s => {
                        if (s.role === 'student') {
                            sample.push({ id: s.id, name: s.name, major: s.field || '-', avatar: s.name?.charAt(0) || 'د' });
                        }
                    });
                }
            } catch (e) {}
            
            students = sample.map(s => ({
                ...s,
                progress: {
                    educational: loadProgress(s.id, 'educational'),
                    defense: loadProgress(s.id, 'defense'),
                    requirements: loadProgress(s.id, 'requirements')
                }
            }));
        }
        
        function loadProgress(id, path) {
            const saved = localStorage.getItem(`prog_${id}_${path}`);
            if (saved) return JSON.parse(saved);
            return STEPS[path].map((_, i) => ({ status: i === 0 ? STATUS_CURRENT : STATUS_INCOMPLETE }));
        }
        
        function saveProgress(id, path, data) {
            localStorage.setItem(`prog_${id}_${path}`, JSON.stringify(data));
        }
        
        function selectPath(path) {
            currentPath = path;
            document.querySelectorAll('.path-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${path}`).classList.add('active');
            renderTable();
            updateStats();
        }
        
        function renderTable() {
            const thead = document.getElementById('table-head');
            const tbody = document.getElementById('table-body');
            const steps = STEPS[currentPath];
            
            // Header
            let headerHTML = '<tr><th class="student-header">دانشجو</th>';
            steps.forEach((step, i) => {
                headerHTML += `<th>
                    <div class="stage-header">
                        <div class="stage-num">${i + 1}</div>
                        <div class="stage-name">${step}</div>
                    </div>
                </th>`;
            });
            headerHTML += '<th>%</th></tr>';
            thead.innerHTML = headerHTML;
            
            // Filter
            let filtered = students;
            if (searchTerm) {
                filtered = filtered.filter(s => s.name.includes(searchTerm) || s.major.includes(searchTerm));
            }
            filtered = filtered.filter(s => {
                const prog = s.progress[currentPath];
                const done = prog.filter(p => p.status === STATUS_COMPLETED).length;
                if (currentFilter === 'completed') return done === prog.length;
                if (currentFilter === 'in-progress') return done > 0 && done < prog.length;
                return true;
            });
            
            // Body
            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="${steps.length + 2}" class="text-center py-8 text-gray-500">
                    <i class="fas fa-user-graduate text-3xl mb-2 block"></i>دانشجویی یافت نشد
                </td></tr>`;
                return;
            }
            
            let bodyHTML = '';
            filtered.forEach(student => {
                const prog = student.progress[currentPath];
                const done = prog.filter(p => p.status === STATUS_COMPLETED).length;
                const pct = Math.round((done / prog.length) * 100);
                
                bodyHTML += '<tr>';
                bodyHTML += `<td class="student-cell">
                    <div class="flex items-center gap-2">
                        <div class="avatar">${student.avatar}</div>
                        <div class="overflow-hidden">
                            <div class="font-bold text-xs truncate">${student.name}</div>
                            <div class="text-[10px] text-gray-500 truncate">${student.major}</div>
                        </div>
                    </div>
                </td>`;
                
                prog.forEach((stage, i) => {
                    const status = stage?.status ?? STATUS_INCOMPLETE;
                    let cls = 'incomplete', icon = '<i class="fas fa-times"></i>';
                    if (status === STATUS_COMPLETED) { cls = 'completed'; icon = '<i class="fas fa-check"></i>'; }
                    else if (status === STATUS_CURRENT) { cls = 'current'; icon = '<i class="fas fa-spinner fa-spin"></i>'; }
                    
                    bodyHTML += `<td>
                        <div class="progress-circle ${cls}" onclick="toggleStage('${student.id}', ${i})">${icon}</div>
                    </td>`;
                });
                
                bodyHTML += `<td>
                    <span class="px-2 py-1 rounded-full text-[10px] font-bold ${pct === 100 ? 'bg-green-100 text-green-700' : pct > 50 ? 'bg-blue-100 text-blue-700' : 'bg-red-100 text-red-700'}">
                        ${pct}${pct === 100 ? ' 🏆' : '%'}
                    </span>
                </td>`;
                bodyHTML += '</tr>';
            });
            
            tbody.innerHTML = bodyHTML;
        }
        
        function toggleStage(studentId, stageIndex) {
            const student = students.find(s => s.id === studentId);
            if (!student) return;
            
            const prog = student.progress[currentPath];
            const current = prog[stageIndex]?.status ?? STATUS_INCOMPLETE;
            
            // Cycle: incomplete → current → completed → incomplete
            if (current === STATUS_INCOMPLETE) prog[stageIndex].status = STATUS_CURRENT;
            else if (current === STATUS_CURRENT) prog[stageIndex].status = STATUS_COMPLETED;
            else prog[stageIndex].status = STATUS_INCOMPLETE;
            
            saveProgress(studentId, currentPath, prog);
            renderTable();
            updateStats();
        }
        
        function updateStats() {
            const total = students.length;
            let sum = 0, inProg = 0, done = 0;
            
            students.forEach(s => {
                const prog = s.progress[currentPath];
                const d = prog.filter(p => p.status === STATUS_COMPLETED).length;
                sum += (d / prog.length) * 100;
                if (d === prog.length) done++;
                else if (d > 0) inProg++;
            });
            
            document.getElementById('total-students').textContent = total;
            document.getElementById('avg-progress').textContent = Math.round(sum / total) + '%';
            document.getElementById('in-progress-count').textContent = inProg;
            document.getElementById('completed-count').textContent = done;
        }
        
        function setFilter(f) {
            currentFilter = f;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`filter-${f}`).classList.add('active');
            renderTable();
        }
        
        function filterStudents() {
            searchTerm = document.getElementById('search-input').value;
            renderTable();
        }
        
        function saveAllProgress() {
            students.forEach(s => {
                saveProgress(s.id, 'educational', s.progress.educational);
                saveProgress(s.id, 'defense', s.progress.defense);
                saveProgress(s.id, 'requirements', s.progress.requirements);
            });
            alert('ذخیره شد');
        }
        
        function exportToExcel() {
            const steps = STEPS[currentPath];
            let csv = 'نام,رشته,' + steps.join(',') + ',درصد\n';
            students.forEach(s => {
                const prog = s.progress[currentPath];
                const done = prog.filter(p => p.status === STATUS_COMPLETED).length;
                csv += `"${s.name}","${s.major}",`;
                csv += prog.map(p => p.status === STATUS_COMPLETED ? '✓' : p.status === STATUS_CURRENT ? '●' : '✗').join(',');
                csv += `,${Math.round((done / prog.length) * 100)}%\n`;
            });
            
            const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `sheet-${currentPath}.csv`;
            a.click();
        }
    </script>
</body>
</html>
