{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - الدراسات العليا</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap');
        
        * {
            font-family: 'Tajawal', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
            min-height: 100vh;
        }
        
        .logo-container img {
            max-width: 200px;
            height: auto;
            display: block;
            margin: 0 auto;
        }
        
        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            border: 2px solid #d4af37;
        }
        
        .header-section {
            background: linear-gradient(135deg, #d4af37 0%, #c9a961 100%);
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.3);
        }
        
        .google-btn {
            background: white;
            border: 2px solid #e0e0e0;
            transition: all 0.3s ease;
        }
        
        .google-btn:hover {
            border-color: #d4af37;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
            transform: translateY(-2px);
        }
        
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 30px 0;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .divider span {
            padding: 0 15px;
            color: #999;
            font-size: 14px;
        }
        
        .input-field {
            border: 2px solid #e0e0e0;
            transition: all 0.3s ease;
            background: #fafafa;
        }
        
        .input-field:focus {
            border-color: #d4af37;
            outline: none;
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
            background: white;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #d4af37 0%, #c9a961 100%);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4);
        }
    </style>
</head>
<body class="py-8 px-4">
    <div class="max-w-md mx-auto">
        <!-- Logo -->
        <div class="logo-container text-center mb-6">
            <img src="{% static 'assets/logoi.png' %}" 
                 alt="Logo" 
                 onerror="this.onerror=null; this.src='{% static 'logoi.png' %}';"
                 loading="eager">
        </div>

        <!-- Header -->
        <div class="header-section rounded-2xl p-6 mb-6 shadow-lg">
            <div class="text-center">
                <h1 class="text-4xl font-bold text-white mb-2">تسجيل الدخول</h1>
                <p class="text-white/90 text-lg">مرحباً بك في نظام التسجيل</p>
            </div>
        </div>

        <!-- Login Container -->
        <div class="login-container p-8">
            {% if messages %}
                {% for message in messages %}
                    <div class="mb-4 p-4 rounded-lg {% if message.tags == 'error' %}bg-red-100 text-red-700{% else %}bg-green-100 text-green-700{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <!-- Google Login Button -->
            <a href="{% url 'google_login' %}" class="google-btn w-full flex items-center justify-center gap-3 py-4 rounded-xl font-bold text-gray-700 text-lg">
                <svg class="w-6 h-6" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                تسجيل الدخول باستخدام Google
            </a>

            <div class="divider">
                <span>أو</span>
            </div>

            <!-- Traditional Login Form -->
            <form method="post" action="{% url 'login' %}" class="space-y-4">
                {% csrf_token %}
                
                <div>
                    <label class="block mb-2 text-gray-700 font-semibold">البريد الإلكتروني</label>
                    <input type="email" name="username" required 
                        class="input-field w-full rounded-lg px-4 py-3"
                        placeholder="example@email.com">
                </div>

                <div>
                    <label class="block mb-2 text-gray-700 font-semibold">كلمة المرور</label>
                    <input type="password" name="password" required 
                        class="input-field w-full rounded-lg px-4 py-3"
                        placeholder="••••••••">
                </div>

                <button type="submit" class="btn-primary w-full text-white font-bold py-3 rounded-xl text-lg">
                    تسجيل الدخول
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-gray-600">ليس لديك حساب؟ 
                    <a href="{% url 'registration' %}" class="text-[#d4af37] font-bold hover:underline">سجل الآن</a>
                </p>
            </div>
        </div>

        <!-- Footer -->
        <div class="text-center mt-6 text-gray-600">
            <p class="text-sm">جميع الحقوق محفوظة © 2024</p>
        </div>
    </div>
</body>
</html>
