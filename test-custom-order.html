<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تست سفارش سفارشی</title>
    <script src="assets/libs/tailwindcss.js"></script>
    <link href="assets/libs/fontawesome/css/all.min.css" rel="stylesheet">
    <link href="assets/fonts/vazirmatn/vazirmatn.css" rel="stylesheet">
    <link href="css/agent-tasks.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-blue-900 via-indigo-900 to-blue-800 min-h-screen p-6">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold text-white mb-6">
            <i class="fas fa-vial text-yellow-400 ml-2"></i>
            تست سیستم سفارش سفارشی
        </h1>
        
        <!-- Test Controls -->
        <div class="bg-slate-800 rounded-lg p-6 mb-6">
            <h2 class="text-xl font-bold text-white mb-4">کنترل‌های تست</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <button onclick="createTestOrder(1)" 
                        class="bg-green-600 hover:bg-green-700 text-white px-4 py-3 rounded-lg">
                    <i class="fas fa-plus ml-2"></i>
                    ایجاد سفارش با مهلت 2 ساعت
                </button>
                <button onclick="createTestOrder(24)" 
                        class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-3 rounded-lg">
                    <i class="fas fa-plus ml-2"></i>
                    ایجاد سفارش با مهلت 1 روز
                </button>
                <button onclick="createTestOrder(-1)" 
                        class="bg-red-600 hover:bg-red-700 text-white px-4 py-3 rounded-lg">
                    <i class="fas fa-plus ml-2"></i>
                    ایجاد سفارش منقضی شده
                </button>
                <button onclick="clearTestOrders()" 
                        class="bg-yellow-600 hover:bg-yellow-700 text-white px-4 py-3 rounded-lg">
                    <i class="fas fa-trash ml-2"></i>
                    پاک کردن همه سفارشات تست
                </button>
            </div>
        </div>
        
        <!-- Orders Display -->
        <div id="ordersDisplay" class="space-y-4">
            <!-- Orders will be displayed here -->
        </div>
    </div>
    
    <script src="js/config.js"></script>
    <script src="js/data.js"></script>
    <script>
        // Create test order
        function createTestOrder(hoursFromNow) {
            const now = new Date();
            const deadline = new Date(now.getTime() + (hoursFromNow * 60 * 60 * 1000));
            
            const order = {
                id: 'test_order_' + Date.now(),
                type: 'سفارش سفارشی',
                title: `سفارش تست - مهلت ${hoursFromNow > 0 ? hoursFromNow + ' ساعت' : 'گذشته'}`,
                studentName: 'علی محمدی (تست)',
                description: 'این یک سفارش تستی است برای آزمایش تایمر و نمایش',
                deadline: deadline.toLocaleDateString('fa-IR'),
                deadlineTime: deadline.toLocaleTimeString('fa-IR', { hour: '2-digit', minute: '2-digit' }),
                deadlineDateTime: deadline.toISOString(),
                assignedDoctorId: 'agent001',
                assignedDoctor: 'فتحی',
                status: 'in_progress',
                progress: Math.floor(Math.random() * 80),
                createdBy: 'emp001',
                createdByName: 'زهرا',
                createdAt: new Date().toISOString(),
                isCustomOrder: true
            };
            
            const orders = DataModule.getOrders();
            orders.push(order);
            DataModule.saveOrders(orders);
            
            displayOrders();
            alert('سفارش تست ایجاد شد!');
        }
        
        // Clear test orders
        function clearTestOrders() {
            if (!confirm('آیا مطمئن هستید؟')) return;
            
            const orders = DataModule.getOrders();
            const filtered = orders.filter(o => !o.id.startsWith('test_order_'));
            DataModule.saveOrders(filtered);
            
            displayOrders();
            alert('سفارشات تست پاک شدند');
        }
        
        // Display orders
        function displayOrders() {
            const orders = DataModule.getOrders();
            const testOrders = orders.filter(o => o.assignedDoctorId === 'agent001');
            
            // Sort by deadline
            testOrders.sort((a, b) => {
                if (!a.deadlineDateTime) return 1;
                if (!b.deadlineDateTime) return -1;
                return new Date(a.deadlineDateTime) - new Date(b.deadlineDateTime);
            });
            
            const container = document.getElementById('ordersDisplay');
            
            if (testOrders.length === 0) {
                container.innerHTML = `
                    <div class="bg-slate-800 rounded-lg p-8 text-center">
                        <i class="fas fa-inbox text-5xl text-gray-500 mb-4"></i>
                        <p class="text-gray-400">هیچ سفارشی وجود ندارد</p>
                        <p class="text-gray-500 text-sm mt-2">از دکمه‌های بالا برای ایجاد سفارش تست استفاده کنید</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = testOrders.map((order, index) => getAgentOrderCard(order, index)).join('');
            
            // Start timers
            startAgentTimers();
        }
        
        // Get agent order card (copied from app.js)
        function getAgentOrderCard(order, index) {
            const now = new Date();
            const deadline = order.deadlineDateTime ? new Date(order.deadlineDateTime) : null;
            const isExpired = deadline && deadline < now && order.status !== 'completed';
            const borderClass = isExpired ? 'border-r-4 border-red-500' : '';
            
            const timeRemaining = deadline ? deadline - now : null;
            const isUrgent = timeRemaining && timeRemaining < 3600000;
            
            return `
                <div class="bg-slate-700 rounded-lg p-4 hover:bg-slate-600 transition-all order-card-stack order-card-enter ${borderClass}" 
                     style="transform: translateY(${index * 2}px); box-shadow: 0 ${4 + index * 2}px ${8 + index * 4}px rgba(0,0,0,0.3); animation-delay: ${index * 0.1}s;">
                    <div class="flex justify-between items-start mb-3">
                        <div class="flex-1">
                            <div class="flex items-center space-x-2 space-x-reverse mb-2">
                                <span class="bg-indigo-600 text-white px-2 py-1 rounded text-xs font-bold">
                                    #${index + 1}
                                </span>
                                <span class="bg-purple-600 text-white px-2 py-1 rounded text-xs font-medium">
                                    <i class="fas fa-star ml-1"></i>
                                    سفارش سفارشی
                                </span>
                                <span class="px-2 py-1 rounded text-xs font-medium bg-blue-600 text-white">
                                    در حال انجام
                                </span>
                            </div>
                            <h4 class="text-white font-bold text-lg">${order.title}</h4>
                            <p class="text-gray-400 text-sm">دانشجو: ${order.studentName}</p>
                            <p class="text-gray-400 text-sm mt-1">${order.description}</p>
                        </div>
                    </div>
                    
                    <div class="mb-3 p-3 rounded-lg timer-container ${isExpired ? 'bg-red-900 bg-opacity-30' : 'bg-slate-600'}">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center space-x-2 space-x-reverse">
                                <i class="fas fa-clock ${isExpired ? 'text-red-400' : isUrgent ? 'text-yellow-400' : 'text-blue-400'} text-xl"></i>
                                <div>
                                    <p class="text-xs ${isExpired ? 'text-red-300' : 'text-gray-300'}">
                                        ${isExpired ? 'زمان تحویل گذشته!' : 'زمان باقی‌مانده تا تحویل:'}
                                    </p>
                                    <p class="text-lg font-bold countdown-text ${isExpired ? 'text-red-400' : isUrgent ? 'text-yellow-400 timer-urgent' : 'text-white'}" 
                                       id="timer-${order.id}">
                                        محاسبه...
                                    </p>
                                </div>
                            </div>
                            <div class="text-left">
                                <p class="text-xs text-gray-400">تاریخ تحویل:</p>
                                <p class="text-sm text-white font-medium">${order.deadline}</p>
                                <p class="text-xs text-gray-400">ساعت: ${order.deadlineTime}</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <div class="flex justify-between text-xs text-gray-400 mb-1">
                            <span>پیشرفت</span>
                            <span>${order.progress || 0}%</span>
                        </div>
                        <div class="w-full bg-gray-600 rounded-full h-2">
                            <div class="bg-blue-500 h-2 rounded-full transition-all progress-bar-animated" style="width: ${order.progress || 0}%"></div>
                        </div>
                    </div>
                    
                    <div class="flex justify-between items-center">
                        <span class="text-gray-400 text-xs">
                            <i class="fas fa-user ml-1"></i>
                            از: ${order.createdByName}
                        </span>
                        <button onclick="alert('جزئیات سفارش: ' + '${order.id}')" 
                                class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm">
                            <i class="fas fa-eye ml-1"></i>
                            مشاهده جزئیات
                        </button>
                    </div>
                </div>
            `;
        }
        
        // Start timers
        function startAgentTimers() {
            const orders = DataModule.getOrders();
            const myOrders = orders.filter(o => o.assignedDoctorId === 'agent001' && o.deadlineDateTime);
            
            myOrders.forEach(order => {
                updateOrderTimer(order.id, order.deadlineDateTime);
            });
            
            setInterval(() => {
                myOrders.forEach(order => {
                    updateOrderTimer(order.id, order.deadlineDateTime);
                });
            }, 1000);
        }
        
        // Update timer
        function updateOrderTimer(orderId, deadlineDateTime) {
            const timerElement = document.getElementById(`timer-${orderId}`);
            if (!timerElement) return;
            
            const now = new Date();
            const deadline = new Date(deadlineDateTime);
            const diff = deadline - now;
            
            if (diff <= 0) {
                timerElement.textContent = 'زمان تحویل گذشته!';
                timerElement.classList.add('text-red-400');
                return;
            }
            
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            
            let timerText = '';
            if (days > 0) {
                timerText = `${days} روز و ${hours} ساعت`;
            } else if (hours > 0) {
                timerText = `${hours} ساعت و ${minutes} دقیقه`;
            } else if (minutes > 0) {
                timerText = `${minutes} دقیقه و ${seconds} ثانیه`;
            } else {
                timerText = `${seconds} ثانیه`;
            }
            
            timerElement.textContent = timerText;
        }
        
        // Initialize
        displayOrders();
    </script>
</body>
</html>
